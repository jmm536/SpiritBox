<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aggressive Spirit Box Scan</title>
    <style>
        body { background: #000; color: #ff0000; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        button { background: #ff0000; color: #000; border: none; padding: 20px 40px; font-weight: bold; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>
    <button id="scan-btn">SCAN</button>
    <div id="status" style="margin-top: 20px;">READY</div>

<script>
    let audio = new Audio();
    let isScanning = false;
    let stations = [];

    // Aggressive Clipping Logic
    async function aggressiveScan() {
        if (!isScanning) return;
        
        // Randomly pick a station and slice of audio
        const station = stations[Math.floor(Math.random() * stations.length)];
        audio.src = station.url_resolved;
        audio.play().catch(() => {});
        
        // INTERRUPT: Cut the audio after 100ms to force the "Spirit Box" stutter
        setTimeout(() => {
            audio.pause();
            audio.currentTime = 0; 
        }, 100);

        // Next slice
        setTimeout(aggressiveScan, 150); 
    }

    document.getElementById('scan-btn').addEventListener('click', async () => {
        if (!isScanning) {
            isScanning = true;
            document.getElementById('scan-btn').textContent = "STOP";
            if (stations.length === 0) {
                const res = await fetch("https://de1.api.radio-browser.info/json/stations/search?limit=50&hidebroken=true&codec=mp3");
                stations = await res.json();
            }
            aggressiveScan();
        } else {
            isScanning = false;
            document.getElementById('scan-btn').textContent = "SCAN";
            audio.pause();
        }
    });
</script>
</body>
</html>
