<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spirit Box v1.0</title>
    <style>
        body { background: #121212; color: #00ff66; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { border: 2px solid #00ff66; padding: 20px; text-align: center; width: 80%; }
        button { background: #00ff66; border: none; padding: 20px; font-size: 1.5rem; font-weight: bold; cursor: pointer; width: 100%; }
        #log { margin-top: 20px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h1>Spirit Box v1.0</h1>
    <button id="start-btn">START SWEEP</button>
    <div id="log">Ready to connect.</div>
</div>

<script>
    let audio = new Audio();
    let isSweeping = false;
    let stations = [];

    async function fetchStations() {
        document.getElementById('log').textContent = "Fetching stations...";
        try {
            const res = await fetch("https://de1.api.radio-browser.info/json/stations/search?limit=50&hidebroken=true&codec=mp3");
            stations = await res.json();
            document.getElementById('log').textContent = `Loaded ${stations.length} stations.`;
        } catch (e) {
            document.getElementById('log').textContent = "Error loading stations.";
        }
    }

    async function sweep() {
        if (!isSweeping) return;
        
        // Pick a random station
        const station = stations[Math.floor(Math.random() * stations.length)];
        audio.src = station.url_resolved;
        
        // Mobile browsers require this to play
        try {
            await audio.play();
            document.getElementById('log').textContent = `Playing: ${station.name}`;
        } catch (e) {
            document.getElementById('log').textContent = "Waiting for interaction...";
        }

        setTimeout(sweep, 2000); // Sweep every 2 seconds
    }

    document.getElementById('start-btn').addEventListener('click', async () => {
        if (!isSweeping) {
            isSweeping = true;
            document.getElementById('start-btn').textContent = "STOP";
            await fetchStations();
            sweep();
        } else {
            isSweeping = false;
            document.getElementById('start-btn').textContent = "START SWEEP";
            audio.pause();
            document.getElementById('log').textContent = "Stopped.";
        }
    });
</script>
</body>
</html>
