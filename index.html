<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Radio Spirit Box</title>
    <style>
        body {
            background-color: #121212;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            border: 2px solid #00ff66;
            padding: 30px;
            background-color: #1a1a1a;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            margin-top: 0;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
            font-size: 1.8rem;
            letter-spacing: 2px;
        }
        .display {
            background-color: #000;
            border: 1px solid #00ff66;
            padding: 15px;
            height: 90px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 1.2rem;
            overflow: hidden;
            border-radius: 4px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .control-row {
            display: flex;
            justify-content: space-between;
        }
        button {
            background-color: #00ff66;
            color: #000;
            border: none;
            padding: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
        }
        button:hover {
            background-color: #00cc52;
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.6);
        }
        input[type="range"] {
            width: 100%;
            accent-color: #00ff66;
            cursor: pointer;
        }
        .status {
            font-size: 0.75rem;
            color: #666;
            text-align: center;
            margin-top: 20px;
            border-top: 1px dashed #333;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>IP-SPIRIT BOX</h1>
    
    <div class="display" id="display">
        <div id="station-name">SYSTEM READY</div>
        <div id="station-info" style="font-size: 0.8rem; color: #00aa44; margin-top: 8px;">TAP START TO INITIALIZE BANDS</div>
    </div>

    <div class="controls">
        <button id="start-btn">START SWEEP</button>
        
        <div class="control-group">
            <div class="control-row">
                <label for="sweep-rate">Sweep Rate: <strong><span id="rate-val">300</span>ms</strong></label>
            </div>
            <input type="range" id="sweep-rate" min="150" max="1500" step="50" value="300">
        </div>

        <div class="control-group">
            <div class="control-row">
                <label for="static-vol">Radio Static Volume: <strong><span id="static-val">25</span>%</strong></label>
            </div>
            <input type="range" id="static-vol" min="0" max="100" value="25">
        </div>
    </div>

    <div class="status" id="status-log">Connecting to open directory...</div>
</div>

<script>
    // Public Open-Source API Configuration (Radio-Browser Directory)
    // Pulls active, highly voted MP3 streams to optimize browser playback compatibility
    const API_URL = "https://de1.api.radio-browser.info/json/stations/search?limit=200&hidebroken=true&codec=mp3&order=clickcount";
    const POOL_SIZE = 6; // Total background streams running concurrently
    
    let stations = [];
    let audioPool = [];
    let audioContext = null;
    let staticNode = null;
    let staticGain = null;
    
    let isSweeping = false;
    let sweepTimeout = null;
    let activeAudio = null;

    // DOM Target Elements
    const startBtn = document.getElementById('start-btn');
    const sweepRateInput = document.getElementById('sweep-rate');
    const rateVal = document.getElementById('rate-val');
    const staticVolInput = document.getElementById('static-vol');
    const staticVal = document.getElementById('static-val');
    const stationNameDiv = document.getElementById('station-name');
    const stationInfoDiv = document.getElementById('station-info');
    const statusLog = document.getElementById('status-log');

    // UI Listeners
    sweepRateInput.addEventListener('input', () => rateVal.textContent = sweepRateInput.value);
    staticVolInput.addEventListener('input', () => {
        staticVal.textContent = staticVolInput.value;
        if (staticGain) {
            // Normalizing static volume to keep background white noise comfortable
            staticGain.gain.value = (staticVolInput.value / 100) * 0.12; 
        }
    });

    // Synthesize Web Audio White Noise to simulate analog RF static
    function initStaticNoise() {
        if (audioContext) return;
        
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        const bufferSize = 2 * audioContext.sampleRate;
        const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        
        for (let i = 0; i < bufferSize; i++) {
            output[i] = Math.random() * 2 - 1;
        }

        staticNode = audioContext.createBufferSource();
        staticNode.buffer = noiseBuffer;
        staticNode.loop = true;

        staticGain = audioContext.createGain();
        staticGain.gain.value = (staticVolInput.value / 100) * 0.12;

        staticNode.connect(staticGain);
        staticGain.connect(audioContext.destination);
        staticNode.start();
    }

    // Fetch live stream array from the open API directory
    async function fetchStations() {
        try {
            statusLog.textContent = "Querying live global radio indexes...";
            const response = await fetch(API_URL);
            stations = await response.json();
            if (stations.length === 0) throw new Error("Directory returned empty.");
            statusLog.textContent = `Successfully indexed ${stations.length} global streams.`;
        } catch (error) {
            console.error(error);
            statusLog.textContent = "Directory query failed. Retrying backend fetch...";
            setTimeout(fetchStations, 4000);
        }
    }

    // Swap a stream slot out for an entirely new random target from the directory pool
    function assignRandomStation(audioElement) {
        if (!stations.length) return;
        const randomTarget = stations[Math.floor(Math.random() * stations.length)];
        
        audioElement.src = randomTarget.url_resolved || randomTarget.url;
        audioElement.stationData = randomTarget;
        audioElement.volume = 0;
        
        // Background play immediately so it pre-buffers silently 
        audioElement.play().catch(() => { /* Catch browser auto-play guard blocks */ });
    }

    // Pre-populate our background streaming objects
    function buildAudioPool() {
        if (audioPool.length > 0) return;

        for (let i = 0; i < POOL_SIZE; i++) {
            const audio = new Audio();
            audio.crossOrigin = "anonymous";
            audio.preload = "auto";
            assignRandomStation(audio);
            audioPool.push(audio);
        }
    }

    // Execution Core: The Sweep Interval Loop
    function executeSweep() {
        if (!isSweeping) return;

        // Instantly mute the station from the previous tick
        if (activeAudio) {
            activeAudio.volume = 0;
            
            // 35% chance to hot-swap this audio node to a brand new global channel.
            // This guarantees an infinite, ever-changing selection of channels.
            if (Math.random() < 0.35) {
                assignRandomStation(activeAudio);
            }
        }

        // Filter out nodes that haven't received enough data packets yet (readyState < 2)
        const readyChannels = audioPool.filter(a => a.readyState >= 2 && !a.paused);

        if (readyChannels.length > 0) {
            // Pick a random stream that has successfully buffered audio data
            activeAudio = readyChannels[Math.floor(Math.random() * readyChannels.length)];
            
            // Blast the fragment audio
            activeAudio.volume = 1.0;

            // Visual tracking updates
            const cleanName = activeAudio.stationData.name.trim().toUpperCase().substring(0, 24);
            stationNameDiv.textContent = cleanName || "UNKNOWN BAND";
            stationInfoDiv.textContent = `CH: ${Math.floor(Math.random() * 800 + 100)} IP // LOC: ${activeAudio.stationData.countrycode || 'GLOBAL'}`;
        } else {
            // If network stutters occur and nothing is buffered, output purely static behaviors
            stationNameDiv.textContent = "TUNING DIAL...";
            stationInfoDiv.textContent = "BUFFERING CHANNELS...";
            activeAudio = null;
        }

        // Dynamically recalculate delay based on UI slider choices
        sweepTimeout = setTimeout(executeSweep, parseInt(sweepRateInput.value));
    }

    // Master Toggle Control
    startBtn.addEventListener('click', async () => {
        // Handle User Interactivity constraints enforced by modern browsers for audio playback
        if (!audioContext) {
            initStaticNoise();
        }
        if (audioContext.state === 'suspended') {
            await audioContext.resume();
        }

        if (isSweeping) {
            isSweeping = false;
            clearTimeout(sweepTimeout);
            if (activeAudio) activeAudio.volume = 0;
            startBtn.textContent = "START SWEEP";
            stationNameDiv.textContent = "SWEEP HALTED";
            stationInfoDiv.textContent = "SYSTEM STANDBY";
        } else {
            if (stations.length === 0) {
                statusLog.textContent = "Cannot start: Awaiting network index connection.";
                return;
            }
            buildAudioPool();
            isSweeping = true;
            startBtn.textContent = "STOP SWEEP";
            executeSweep();
        }
    });

    // Run fetch pipeline on application initialization
    fetchStations();
</script>

</body>
</html>
