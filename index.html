<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital SB7 Spirit Box</title>
    <style>
        body { background-color: #1a1a1a; color: #fff; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; }
        .device { background: linear-gradient(145deg, #2a2a2a, #1f1f1f); padding: 15px; border-radius: 12px; box-shadow: 5px 5px 15px #111; width: 100%; max-width: 360px; text-align: center; border: 1px solid #333; }
        .lcd-screen { background-color: #0a1a0a; border: 3px solid #000; border-radius: 6px; padding: 10px; margin-bottom: 15px; box-shadow: inset 0 0 10px rgba(0,255,0,0.2); position: relative; overflow: hidden; min-height: 80px; }
        #waveform-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.4; pointer-events: none; }
        .station-display { color: #4af626; font-size: 1.2em; font-weight: bold; text-shadow: 0 0 5px #4af626; margin: 5px 0; min-height: 20px; position: relative; z-index: 2; }
        .status-text { color: #2e8b18; font-size: 0.75em; position: relative; z-index: 2; }
        .controls { display: flex; flex-direction: column; gap: 8px; }
        button { background-color: #d32f2f; color: white; border: none; padding: 12px; font-size: 1em; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; margin-bottom: 5px; }
        button.active { background-color: #388e3c; }
        .control-group { text-align: left; background: #222; padding: 8px; border-radius: 6px; border: 1px solid #333; }
        .control-group label { display: flex; justify-content: space-between; font-size: 0.8em; color: #ccc; margin-bottom: 4px; }
        .control-group label span { color: #4af626; }
        .checkbox-group { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 8px; border-radius: 6px; border: 1px solid #333; font-size: 0.8em; color: #ccc; }
        input[type=checkbox] { width: 18px; height: 18px; accent-color: #d32f2f; }
        select, input[type=range] { width: 100%; padding: 4px; background: #111; color: #4af626; border: 1px solid #444; border-radius: 4px; }
        .slider-labels { display: flex; justify-content: space-between; font-size: 0.6em; color: #777; }
    </style>
</head>
<body>
    <div class="device">
        <div class="lcd-screen">
            <canvas id="waveform-canvas"></canvas>
            <div class="status-text" id="status">STATUS: STANDBY</div>
            <div class="station-display" id="station">-- CH --</div>
            <div class="status-text" id="rate-display">SWEEP: 200ms</div>
        </div>
        <div class="controls">
            <div class="control-group">
                <label for="sweep-rate">Sweep Rate: <span id="rate-val">200ms</span></label>
                <input type="range" id="sweep-rate" min="50" max="2500" value="200" step="50">
                <div class="slider-labels"><span>Fast</span><span>Slow</span></div>
            </div>
            <button id="power-btn">Power / Start</button>
            <div class="control-group">
                <label for="static-vol">Static Volume: <span id="static-val">5%</span></label>
                <input type="range" id="static-vol" min="0" max="100" value="5">
            </div>
            <div class="control-group">
                <label for="master-bass">Bass: <span id="bass-val">0dB</span></label>
                <input type="range" id="master-bass" min="-20" max="20" value="0" step="1">
            </div>
            <div class="control-group">
                <label for="master-treble">Treble: <span id="treble-val">0dB</span></label>
                <input type="range" id="master-treble" min="-20" max="20" value="0" step="1">
            </div>
            <div class="checkbox-group">
                <label for="effect-isolation">Voice Isolation</label>
                <input type="checkbox" id="effect-isolation">
            </div>
            <div class="control-group">
                <label for="effect-echo">Echo: <span id="echo-val">0%</span></label>
                <input type="range" id="effect-echo" min="0" max="100" value="0">
            </div>
            <div class="control-group">
                <label for="pool-size">Pool Size:</label>
                <select id="pool-size">
                    <option value="50">50 Channels</option>
                    <option value="100">100 Channels</option>
                    <option value="200" selected>200 Channels</option>
                    <option value="500">500 Channels</option>
                </select>
            </div>
        </div>
    </div>
    <script>
        let audioElements = [], isSweeping = false, isLoading = false, audioCtx, bassFilter, trebleFilter, bandpassNode, delayNode, feedbackGainNode, wetGainNode, dryGainNode, staticGainNode, staticBufferSource, analyser, masterGainNode, sweepTimer;
        const powerBtn = document.getElementById('power-btn'), stationDisplay = document.getElementById('station'), statusDisplay = document.getElementById('status'), rateDisplay = document.getElementById('rate-display'), sweepRateSlider = document.getElementById('sweep-rate'), rateVal = document.getElementById('rate-val'), poolSizeSelect = document.getElementById('pool-size'), staticVolSlider = document.getElementById('static-vol'), staticValText = document.getElementById('static-val'), bassSlider = document.getElementById('master-bass'), bassValText = document.getElementById('bass-val'), trebleSlider = document.getElementById('master-treble'), trebleValText = document.getElementById('treble-val'), isolationToggle = document.getElementById('effect-isolation'), echoSlider = document.getElementById('effect-echo'), echoValText = document.getElementById('echo-val'), canvas = document.getElementById('waveform-canvas'), canvasCtx = canvas.getContext('2d');

        function initWebAudioEngine() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGainNode = audioCtx.createGain(); masterGainNode.gain.value = 1.5;
                bassFilter = audioCtx.createBiquadFilter(); bassFilter.type = 'lowshelf'; bassFilter.frequency.value = 250; bassFilter.gain.value = parseInt(bassSlider.value);
                trebleFilter = audioCtx.createBiquadFilter(); trebleFilter.type = 'highshelf'; trebleFilter.frequency.value = 4000; trebleFilter.gain.value = parseInt(trebleSlider.value);
                bandpassNode = audioCtx.createBiquadFilter(); bandpassNode.type = 'allpass'; bandpassNode.frequency.value = 1200; bandpassNode.Q.value = 1.5;
                delayNode = audioCtx.createDelay(2.0); delayNode.delayTime.value = 0.4; feedbackGainNode = audioCtx.createGain(); feedbackGainNode.gain.value = 0.0; wetGainNode = audioCtx.createGain(); wetGainNode.gain.value = 0.0; dryGainNode = audioCtx.createGain(); dryGainNode.gain.value = 1.0;
                analyser = audioCtx.createAnalyser(); analyser.fftSize = 2048;
                bassFilter.connect(trebleFilter); trebleFilter.connect(bandpassNode); bandpassNode.connect(dryGainNode); bandpassNode.connect(delayNode); delayNode.connect(feedbackGainNode); feedbackGainNode.connect(delayNode); delayNode.connect(wetGainNode); dryGainNode.connect(analyser); wetGainNode.connect(analyser); analyser.connect(masterGainNode); masterGainNode.connect(audioCtx.destination);
                staticGainNode = audioCtx.createGain(); staticGainNode.gain.value = parseInt(staticVolSlider.value) / 100; staticGainNode.connect(bassFilter);
                const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate), output = noiseBuffer.getChannelData(0); for (let i = 0; i < noiseBuffer.length; i++) output[i] = Math.random() * 2 - 1;
                staticBufferSource = audioCtx.createBufferSource(); staticBufferSource.buffer = noiseBuffer; staticBufferSource.loop = true; staticBufferSource.connect(staticGainNode); staticBufferSource.start();
                drawWaveform();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function triggerChannelClick() {
            if(!audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 0.05;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for(let i=0; i<bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 2000;
            const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            noise.connect(filter); filter.connect(gain); gain.connect(masterGainNode); noise.start();
        }

        async function fetchRandomStations(limit) {
            try {
                const response = await fetch(`https://de1.api.radio-browser.info/json/stations/search?limit=${limit}&order=random&hidebroken=true&language=english`);
                const stations = await response.json();
                return stations.map(s => s.url_resolved);
            } catch (e) { return ["https://stream.live.vc.bbcmedia.co.uk/bbc_world_service"]; }
        }

        function setupAudioPool(urls) {
            destroyAudioPool();
            urls.forEach(url => {
                const audio = new Audio(url); audio.crossOrigin = "anonymous"; audio.volume = 0; audio.loop = true;
                try { const source = audioCtx.createMediaElementSource(audio); source.connect(bassFilter); } catch (e) {}
                audioElements.push(audio);
            });
        }

        function destroyAudioPool() { audioElements.forEach(a => { a.pause(); a.removeAttribute('src'); a.load(); }); audioElements = []; }

        function drawWaveform() {
            if (canvas.width !== canvas.clientWidth || canvas.height !== canvas.clientHeight) { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; }
            requestAnimationFrame(drawWaveform);
            if (!analyser) return;
            const dataArray = new Uint8Array(analyser.frequencyBinCount); analyser.getByteTimeDomainData(dataArray);
            canvasCtx.clearRect(0, 0, canvas.width, canvas.height); canvasCtx.beginPath();
            for (let i = 0; i < dataArray.length; i++) { const v = dataArray[i]/128.0; canvasCtx.lineTo(i * (canvas.width/dataArray.length), v * canvas.height/2); }
            canvasCtx.stroke();
        }

        function switchStation() {
            if (!isSweeping || audioElements.length === 0) return;
            audioElements.forEach(a => a.volume = 0);
            const sel = audioElements[Math.floor(Math.random() * audioElements.length)];
            if(sel) { sel.volume = 1; triggerChannelClick(); }
            stationDisplay.innerText = `POOL CH ${audioElements.indexOf(sel) + 1}`;
        }

        powerBtn.addEventListener('click', async () => {
            if (isLoading) return;
            if (!isSweeping) {
                isLoading = true; initWebAudioEngine(); staticGainNode.gain.value = parseInt(staticVolSlider.value) / 100;
                const urls = await fetchRandomStations(parseInt(poolSizeSelect.value));
                setupAudioPool(urls); audioElements.forEach(a => a.play().catch(()=>{}));
                isSweeping = true; isLoading = false; powerBtn.classList.add('active'); powerBtn.innerText = "Stop Sweep"; statusDisplay.innerText = "STATUS: SWEEPING"; poolSizeSelect.disabled = true;
                sweepTimer = setInterval(switchStation, parseInt(sweepRateSlider.value));
            } else {
                isSweeping = false; clearInterval(sweepTimer); powerBtn.classList.remove('active'); powerBtn.innerText = "Power / Start"; statusDisplay.innerText = "STATUS: STANDBY"; poolSizeSelect.disabled = false; if(staticGainNode) staticGainNode.gain.value = 0; destroyAudioPool();
            }
        });
        sweepRateSlider.oninput = (e) => { rateVal.innerText = e.target.value + "ms"; rateDisplay.innerText = `SWEEP: ${e.target.value}ms`; if(isSweeping) { clearInterval(sweepTimer); sweepTimer = setInterval(switchStation, parseInt(e.target.value)); } };
        staticVolSlider.oninput = (e) => { staticValText.innerText = e.target.value + "%"; if(staticGainNode && isSweeping) staticGainNode.gain.value = e.target.value / 100; };
        bassSlider.oninput = (e) => { bassValText.innerText = (e.target.value > 0 ? "+" : "") + e.target.value + "dB"; if(bassFilter) bassFilter.gain.value = e.target.value; };
        trebleSlider.oninput = (e) => { trebleValText.innerText = (e.target.value > 0 ? "+" : "") + e.target.value + "dB"; if(trebleFilter) trebleFilter.gain.value = e.target.value; };
        isolationToggle.onchange = (e) => { if(bandpassNode) bandpassNode.type = e.target.checked ? 'bandpass' : 'allpass'; };
        echoSlider.oninput = (e) => { echoValText.innerText = e.target.value + "%"; if(wetGainNode && feedbackGainNode) { wetGainNode.gain.value = (e.target.value / 100) * 0.7; feedbackGainNode.gain.value = (e.target.value / 100) * 0.6; } };
    </script>
</body>
</html>
