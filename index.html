<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Radio Spirit Box (Static Fixed)</title>
    <style>
        body {
            background-color: #121212;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            border: 2px solid #00ff66;
            padding: 30px;
            background-color: #1a1a1a;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            margin-top: 0;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
            font-size: 1.8rem;
            letter-spacing: 2px;
        }
        .display {
            background-color: #000;
            border: 1px solid #00ff66;
            padding: 15px;
            height: 90px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 1.2rem;
            overflow: hidden;
            border-radius: 4px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .control-row {
            display: flex;
            justify-content: space-between;
        }
        button {
            background-color: #00ff66;
            color: #000;
            border: none;
            padding: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
        }
        button:hover {
            background-color: #00cc52;
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.6);
        }
        input[type="range"] {
            width: 100%;
            accent-color: #00ff66;
            cursor: pointer;
        }
        .status {
            font-size: 0.75rem;
            color: #888;
            text-align: center;
            margin-top: 20px;
            border-top: 1px dashed #333;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>IP-SPIRIT BOX v2.1</h1>
    
    <div class="display" id="display">
        <div id="station-name">SYSTEM READY</div>
        <div id="station-info" style="font-size: 0.8rem; color: #00aa44; margin-top: 8px;">TAP START TO INITIALIZE BANDS</div>
    </div>

    <div class="controls">
        <button id="start-btn">START SWEEP</button>
        
        <div class="control-group">
            <div class="control-row">
                <label for="sweep-rate">Sweep Rate: <strong><span id="rate-val">300</span>ms</strong></label>
            </div>
            <input type="range" id="sweep-rate" min="150" max="1500" step="50" value="300">
        </div>

        <div class="control-group">
            <div class="control-row">
                <label for="static-vol">Radio Static Volume: <strong><span id="static-val">25</span>%</strong></label>
            </div>
            <input type="range" id="static-vol" min="0" max="100" value="25">
        </div>
    </div>

    <div class="status" id="status-log">Connecting to open directory...</div>
</div>

<script>
    const API_URL = "https://de1.api.radio-browser.info/json/stations/search?limit=300&hidebroken=true&codec=mp3&order=clickcount";
    const POOL_SIZE = 8;
    
    let stations = [];
    let audioPool = [];
    let audioContext = null;
    let staticNode = null;
    let staticGain = null;
    
    let isSweeping = false;
    let sweepTimeout = null;
    let activeAudio = null;

    const startBtn = document.getElementById('start-btn');
    const sweepRateInput = document.getElementById('sweep-rate');
    const rateVal = document.getElementById('rate-val');
    const staticVolInput = document.getElementById('static-vol');
    const staticVal = document.getElementById('static-val');
    const stationNameDiv = document.getElementById('station-name');
    const stationInfoDiv = document.getElementById('station-info');
    const statusLog = document.getElementById('status-log');

    sweepRateInput.addEventListener('input', () => rateVal.textContent = sweepRateInput.value);
    staticVolInput.addEventListener('input', () => {
        staticVal.textContent = staticVolInput.value;
        if (staticGain) {
            staticGain.gain.value = (staticVolInput.value / 100) * 0.12; 
        }
    });

    function initStaticNoise() {
        if (audioContext) return;
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        const bufferSize = 2 * audioContext.sampleRate;
        const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        
        for (let i = 0; i < bufferSize; i++) {
            output[i] = Math.random() * 2 - 1;
        }

        staticNode = audioContext.createBufferSource();
        staticNode.buffer = noiseBuffer;
        staticNode.loop = true;

        staticGain = audioContext.createGain();
        staticGain.gain.value = (staticVolInput.value / 100) * 0.12;

        staticNode.connect(staticGain);
        staticGain.connect(audioContext.destination);
        staticNode.start();
    }

    async function fetchStations() {
        try {
            statusLog.textContent = "Querying live global radio indexes...";
            const response = await fetch(API_URL);
            let rawStations = await response.json();
            
            const isHttpsMode = window.location.protocol === 'https:';
            if (isHttpsMode) {
                stations = rawStations.filter(s => (s.url_resolved || s.url).startsWith('https://'));
                statusLog.textContent = `Indexed ${stations.length} secure HTTPS streams.`;
            } else {
                stations = rawStations;
                statusLog.textContent = `Indexed ${stations.length} global streams.`;
            }

            if (stations.length === 0) throw new Error("No compatible streams found.");
        } catch (error) {
            console.error(error);
            statusLog.textContent = "Directory fetch failed. Retrying configuration...";
            setTimeout(fetchStations, 5000);
        }
    }

    function assignRandomStation(audioElement) {
        if (!stations.length) return;
        const randomTarget = stations[Math.floor(Math.random() * stations.length)];
        
        audioElement.src = randomTarget.url_resolved || randomTarget.url;
        audioElement.stationData = randomTarget;
        audioElement.volume = 0;
        
        audioElement.play().catch(() => {});
    }

    function buildAudioPool() {
        if (audioPool.length > 0) return;

        for (let i = 0; i < POOL_SIZE; i++) {
            const audio = new Audio();
            audio.preload = "auto";
            
            audio.addEventListener('error', () => {
                if (isSweeping) {
                    assignRandomStation(audio);
                }
            });

            assignRandomStation(audio);
            audioPool.push(audio);
        }
    }

    function executeSweep() {
        if (!isSweeping) return;

        if (activeAudio) {
            activeAudio.volume = 0;
            if (Math.random() < 0.40) {
                assignRandomStation(activeAudio);
            }
        }

        const readyChannels = audioPool.filter(a => a.readyState >= 2 && !a.paused && !a.error);

        if (readyChannels.length > 0) {
            activeAudio = readyChannels[Math.floor(Math.random() * readyChannels.length)];
            activeAudio.volume = 1.0;

            const cleanName = activeAudio.stationData.name.trim().toUpperCase().substring(0, 24);
            stationNameDiv.textContent = cleanName || "UNKNOWN BAND";
            stationInfoDiv.textContent = `CH: ${Math.floor(Math.random() * 800 + 100)} IP // LOC: ${activeAudio.stationData.countrycode || 'GLOBAL'}`;
        } else {
            stationNameDiv.textContent = "TUNING DIAL...";
            stationInfoDiv.textContent = `RE-BUFFERING BANDS (${audioPool.filter(a => a.readyState < 2).length} STALLED)`;
            activeAudio = null;
        }

        sweepTimeout = setTimeout(executeSweep, parseInt(sweepRateInput.value));
    }

    startBtn.addEventListener('click', async () => {
        if (!audioContext) {
            initStaticNoise();
        }
        
        if (isSweeping) {
            // STOP ACTION
            isSweeping = false;
            clearTimeout(sweepTimeout);
            
            // Mute background radio pools
            audioPool.forEach(a => a.volume = 0);
            if (activeAudio) activeAudio.volume = 0;
            
            // FIX: Suspend the Web Audio engine entirely to kill the generated static noise
            if (audioContext && audioContext.state === 'running') {
                await audioContext.suspend();
            }
            
            startBtn.textContent = "START SWEEP";
            stationNameDiv.textContent = "SWEEP HALTED";
            stationInfoDiv.textContent = "SYSTEM STANDBY";
        } else {
            // START ACTION
            if (stations.length === 0) {
                statusLog.textContent = "Error: Directory not populated yet.";
                return;
            }
            
            // Wake the audio engine back up if it was suspended
            if (audioContext && audioContext.state === 'suspended') {
                await audioContext.resume();
            }
            
            buildAudioPool();
            isSweeping = true;
            startBtn.textContent = "STOP SWEEP";
            executeSweep();
        }
    });

    fetchStations();
</script>

</body>
</html>
