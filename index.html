<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital SB7 Spirit Box</title>
    <style>
        body { background-color: #1a1a1a; color: #fff; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; }
        .device { background: linear-gradient(145deg, #2a2a2a, #1f1f1f); padding: 15px; border-radius: 12px; box-shadow: 5px 5px 15px #111; width: 100%; max-width: 360px; text-align: center; border: 1px solid #333; }
        .lcd-screen { background-color: #0a1a0a; border: 3px solid #000; border-radius: 6px; padding: 10px; margin-bottom: 15px; box-shadow: inset 0 0 10px rgba(0,255,0,0.2); position: relative; overflow: hidden; min-height: 80px; }
        #waveform-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.6; pointer-events: none; }
        .station-display { color: #4af626; font-size: 1.2em; font-weight: bold; text-shadow: 0 0 5px #4af626; margin: 5px 0; min-height: 20px; position: relative; z-index: 2; }
        .status-text { color: #2e8b18; font-size: 0.75em; position: relative; z-index: 2; }
        .controls { display: flex; flex-direction: column; gap: 6px; }
        button { background-color: #d32f2f; color: white; border: none; padding: 10px; font-size: 1em; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; }
        button.active { background-color: #388e3c; }
        .control-group { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 6px 10px; border-radius: 6px; border: 1px solid #333; font-size: 0.8em; }
        .stepper { display: flex; align-items: center; gap: 8px; }
        .stepper button { padding: 2px 10px; font-size: 1.1em; background: #444; }
        .stepper span { color: #4af626; min-width: 40px; text-align: center; }
        .checkbox-group { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 8px 10px; border-radius: 6px; border: 1px solid #333; font-size: 0.8em; color: #ccc; }
        input[type=checkbox] { width: 18px; height: 18px; accent-color: #d32f2f; }
        select { width: 100%; padding: 4px; background: #111; color: #4af626; border: 1px solid #444; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="device">
        <div class="lcd-screen">
            <canvas id="waveform-canvas"></canvas>
            <div class="status-text" id="status">STATUS: STANDBY</div>
            <div class="station-display" id="station">-- CH --</div>
            <div class="status-text" id="rate-display">SWEEP: 200ms</div>
        </div>
        <div class="controls">
            <button id="power-btn">Power / Start</button>
            <div class="control-group">
                <span>Sweep Rate</span>
                <div class="stepper">
                    <button onclick="updateStepper('sweep', -50)">-</button>
                    <span id="sweep-val">200ms</span>
                    <button onclick="updateStepper('sweep', 50)">+</button>
                </div>
            </div>
            <div class="control-group">
                <span>Reverb</span>
                <div class="stepper">
                    <button onclick="updateStepper('reverb', -10)">-</button>
                    <span id="reverb-val">0%</span>
                    <button onclick="updateStepper('reverb', 10)">+</button>
                </div>
            </div>
            <div class="control-group">
                <span>Static Vol</span>
                <div class="stepper">
                    <button onclick="updateStepper('static', -5)">-</button>
                    <span id="static-val">5%</span>
                    <button onclick="updateStepper('static', 5)">+</button>
                </div>
            </div>
            <div class="control-group">
                <span>Bass</span>
                <div class="stepper">
                    <button onclick="updateStepper('bass', -1)">-</button>
                    <span id="bass-val">0dB</span>
                    <button onclick="updateStepper('bass', 1)">+</button>
                </div>
            </div>
            <div class="control-group">
                <span>Treble</span>
                <div class="stepper">
                    <button onclick="updateStepper('treble', -1)">-</button>
                    <span id="treble-val">0dB</span>
                    <button onclick="updateStepper('treble', 1)">+</button>
                </div>
            </div>
            <div class="checkbox-group">
                <label for="effect-isolation">Voice Isolation</label>
                <input type="checkbox" id="effect-isolation">
            </div>
            <div class="checkbox-group">
                <label for="effect-click">Channel Click</label>
                <input type="checkbox" id="effect-click" checked>
            </div>
            <div class="control-group">
                <select id="lang-filter">
                    <option value="all">All Languages</option>
                    <option value="english" selected>English Only</option>
                </select>
            </div>
            <div class="control-group">
                <select id="pool-size">
                    <option value="50">50 Channels</option>
                    <option value="100">100 Channels</option>
                    <option value="200" selected>200 Channels</option>
                    <option value="500">500 Channels</option>
                </select>
            </div>
        </div>
    </div>
    <script>
        let audioElements = [], isSweeping = false, isLoading = false, audioCtx, bassFilter, trebleFilter, bandpassNode, analyser, masterGainNode, sweepTimer, staticGainNode, staticSource, reverbNode, wetGainNode;
        let vals = { sweep: 200, static: 5, bass: 0, treble: 0, reverb: 0 };
        const powerBtn = document.getElementById('power-btn'), stationDisplay = document.getElementById('station'), statusDisplay = document.getElementById('status'), rateDisplay = document.getElementById('rate-display'), langFilterSelect = document.getElementById('lang-filter'), poolSizeSelect = document.getElementById('pool-size'), isolationToggle = document.getElementById('effect-isolation'), clickToggle = document.getElementById('effect-click'), canvas = document.getElementById('waveform-canvas'), canvasCtx = canvas.getContext('2d');

        function updateStepper(key, delta) {
            if(key === 'sweep') vals.sweep = Math.max(50, Math.min(2500, vals.sweep + delta));
            if(key === 'static') vals.static = Math.max(0, Math.min(100, vals.static + delta));
            if(key === 'bass') vals.bass = Math.max(-20, Math.min(20, vals.bass + delta));
            if(key === 'treble') vals.treble = Math.max(-20, Math.min(20, vals.treble + delta));
            if(key === 'reverb') vals.reverb = Math.max(0, Math.min(100, vals.reverb + delta));
            
            document.getElementById(key + '-val').innerText = vals[key] + (key === 'sweep' ? 'ms' : (key === 'reverb' || key === 'static' ? '%' : 'dB'));
            
            if(key === 'sweep') {
                rateDisplay.innerText = `SWEEP: ${vals.sweep}ms`;
                if(isSweeping) { clearInterval(sweepTimer); sweepTimer = setInterval(switchStation, vals.sweep); }
            }
            
            if(audioCtx) {
                if(key === 'bass' && bassFilter) bassFilter.gain.value = vals.bass;
                if(key === 'treble' && trebleFilter) trebleFilter.gain.value = vals.treble;
                if(key === 'static' && staticGainNode) staticGainNode.gain.value = vals.static / 100;
                if(key === 'reverb' && wetGainNode) wetGainNode.gain.value = vals.reverb / 100;
            }
        }

        function triggerChannelClick() {
            if(!audioCtx || !clickToggle.checked) return;
            const bufferSize = audioCtx.sampleRate * 0.05;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for(let i=0; i<bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 2000;
            const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            noise.connect(filter); filter.connect(gain); gain.connect(masterGainNode); noise.start();
        }

        function initWebAudioEngine() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGainNode = audioCtx.createGain(); masterGainNode.gain.value = 1.5;
                bassFilter = audioCtx.createBiquadFilter(); bassFilter.type = 'lowshelf'; bassFilter.frequency.value = 250; bassFilter.gain.value = vals.bass;
                trebleFilter = audioCtx.createBiquadFilter(); trebleFilter.type = 'highshelf'; trebleFilter.frequency.value = 4000; trebleFilter.gain.value = vals.treble;
                bandpassNode = audioCtx.createBiquadFilter(); bandpassNode.type = 'allpass'; bandpassNode.frequency.value = 1200; bandpassNode.Q.value = 1.5;
                
                reverbNode = audioCtx.createConvolver();
                const rate = audioCtx.sampleRate;
                const length = rate * 2;
                const impulse = audioCtx.createBuffer(2, length, rate);
                for (let i = 0; i < 2; i++) {
                    const channel = impulse.getChannelData(i);
                    for (let j = 0; j < length; j++) channel[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / length, 2);
                }
                reverbNode.buffer = impulse;
                wetGainNode = audioCtx.createGain(); wetGainNode.gain.value = vals.reverb / 100;
                
                analyser = audioCtx.createAnalyser(); analyser.fftSize = 2048;
                bassFilter.connect(trebleFilter); trebleFilter.connect(bandpassNode); 
                bandpassNode.connect(analyser); bandpassNode.connect(reverbNode); reverbNode.connect(wetGainNode);
                analyser.connect(masterGainNode); wetGainNode.connect(masterGainNode);
                masterGainNode.connect(audioCtx.destination);
                
                staticGainNode = audioCtx.createGain(); staticGainNode.gain.value = vals.static / 100; staticGainNode.connect(bassFilter);
                drawWaveform();
            }
            
            if(!staticSource) {
                const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate), output = noiseBuffer.getChannelData(0); for (let i = 0; i < noiseBuffer.length; i++) output[i] = Math.random() * 2 - 1;
                staticSource = audioCtx.createBufferSource(); staticSource.buffer = noiseBuffer; staticSource.loop = true; staticSource.connect(staticGainNode); staticSource.start();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function drawWaveform() {
            requestAnimationFrame(drawWaveform);
            if (canvas.width !== canvas.clientWidth || canvas.height !== canvas.clientHeight) { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; }
            if (!analyser) return;
            const dataArray = new Uint8Array(analyser.frequencyBinCount); analyser.getByteTimeDomainData(dataArray);
            let sum = 0; for(let i=0; i<dataArray.length; i++) sum += Math.abs(dataArray[i]-128);
            let avg = sum / dataArray.length;
            canvasCtx.clearRect(0, 0, canvas.width, canvas.height); canvasCtx.beginPath();
            canvasCtx.strokeStyle = (avg > 5) ? '#ff4444' : '#4af626';
            for (let i = 0; i < dataArray.length; i++) { const v = dataArray[i]/128.0; canvasCtx.lineTo(i * (canvas.width/dataArray.length), v * canvas.height/2); }
            canvasCtx.stroke();
        }

        function switchStation() {
            if (!isSweeping || audioElements.length === 0) return;
            audioElements.forEach(a => a.volume = 0);
            const sel = audioElements[Math.floor(Math.random() * audioElements.length)];
            if(sel) { 
                sel.volume = 1; 
                triggerChannelClick();
            }
            stationDisplay.innerText = `POOL CH ${audioElements.indexOf(sel) + 1}`;
        }

        powerBtn.addEventListener('click', async () => {
            if (isLoading) return;
            if (!isSweeping) {
                isLoading = true; initWebAudioEngine();
                const lang = langFilterSelect.value;
                const url = `https://de1.api.radio-browser.info/json/stations/search?limit=${parseInt(poolSizeSelect.value)}&order=random&hidebroken=true${lang !== 'all' ? '&language='+lang : ''}`;
                const response = await fetch(url);
                const stations = await response.json();
                stations.forEach(s => {
                    const a = new Audio(s.url_resolved); a.crossOrigin = "anonymous"; a.volume = 0; a.loop = true;
                    try { audioCtx.createMediaElementSource(a).connect(bassFilter); } catch (e) {}
                    a.play().catch(()=>{});
                    audioElements.push(a);
                });
                isSweeping = true; isLoading = false; powerBtn.classList.add('active'); powerBtn.innerText = "Stop Sweep"; statusDisplay.innerText = "STATUS: SWEEPING"; poolSizeSelect.disabled = true; langFilterSelect.disabled = true;
                sweepTimer = setInterval(switchStation, vals.sweep);
            } else {
                isSweeping = false; clearInterval(sweepTimer); powerBtn.classList.remove('active'); powerBtn.innerText = "Power / Start"; statusDisplay.innerText = "STATUS: STANDBY"; poolSizeSelect.disabled = false; langFilterSelect.disabled = false;
                audioElements.forEach(a => { a.pause(); a.src = ""; }); audioElements = [];
                if(staticSource) { staticSource.stop(); staticSource = null; }
            }
        });
        isolationToggle.onchange = (e) => { if(bandpassNode) bandpassNode.type = e.target.checked ? 'bandpass' : 'allpass'; };
    </script>
</body>
</html>
