<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Radio Spirit Box (Decoder Edition)</title>
    <style>
        body {
            background-color: #121212;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            border: 2px solid #00ff66;
            padding: 25px;
            background-color: #1a1a1a;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            border-radius: 8px;
            width: 100%;
            max-width: 520px;
        }
        h1 {
            text-align: center;
            margin-top: 0;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
            font-size: 1.4rem;
            letter-spacing: 2px;
        }
        .display {
            background-color: #000;
            border: 1px solid #00ff66;
            padding: 15px;
            height: 75px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 1.1rem;
            overflow: hidden;
            border-radius: 4px;
        }
        .scope-container {
            background-color: #000;
            border: 1px solid #00ff66;
            border-radius: 4px;
            width: 100%;
            height: 90px;
            margin-bottom: 10px;
            box-sizing: border-box;
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* New Decoder Terminal Styles */
        .terminal-container {
            background-color: #050505;
            border: 1px solid #00ff66;
            border-radius: 4px;
            height: 110px;
            padding: 10px;
            margin-bottom: 20px;
            overflow-y: auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column-reverse; /* Keeps freshest words scrolling at bottom */
        }
        .terminal-line {
            font-size: 0.85rem;
            line-height: 1.3;
            color: #00ff66;
            text-shadow: 0 0 4px rgba(0, 255, 102, 0.3);
        }
        .terminal-line.interim {
            color: #00aa44;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .control-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }
        button {
            background-color: #00ff66;
            color: #000;
            border: none;
            padding: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
            letter-spacing: 1px;
        }
        button:hover {
            background-color: #00cc52;
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.6);
        }
        button.active-decoding {
            background-color: #ff3333;
            color: #fff;
        }
        input[type="range"], select {
            width: 100%;
            accent-color: #00ff66;
            cursor: pointer;
        }
        select {
            background-color: #000;
            color: #00ff66;
            border: 1px solid #00ff66;
            padding: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            border-radius: 4px;
            outline: none;
        }
        .status {
            font-size: 0.75rem;
            color: #888;
            text-align: center;
            margin-top: 15px;
            border-top: 1px dashed #333;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>IP-SPIRIT BOX v3.7 // DECODER</h1>
    
    <div class="display" id="display">
        <div id="station-name">SYSTEM READY</div>
        <div id="station-info" style="font-size: 0.8rem; color: #00aa44; margin-top: 4px;">PRESS START TO WORK BANDS</div>
    </div>

    <div class="scope-container">
        <canvas id="scope"></canvas>
    </div>

    <div class="terminal-container" id="terminal-log">
        <div class="terminal-line" id="interim-text-line"></div>
    </div>

    <div class="controls">
        <button id="start-btn">START SWEEP</button>
        <button id="decoder-btn">ENABLE TEXT DECODER</button>
        
        <div class="control-group">
            <div class="control-row">
                <label for="lang-select">Language Filter Matrix:</label>
            </div>
            <select id="lang-select">
                <option value="all">All Global Languages (Random Mix)</option>
                <option value="english" selected>English Only</option>
            </select>
        </div>

        <div class="control-group">
            <div class="control-row">
                <label for="sweep-rate">Sweep Rate: <strong><span id="rate-val">200</span>ms</strong></label>
            </div>
            <input type="range" id="sweep-rate" min="50" max="1000" step="25" value="200">
        </div>

        <div class="control-group">
            <div class="control-row">
                <label for="bass-cut">Static Bass Cut (High-Pass): <strong><span id="bass-val">150</span> Hz</strong></label>
            </div>
            <input type="range" id="bass-cut" min="20" max="1200" step="10" value="150">
        </div>

        <div class="control-group">
            <div class="control-row">
                <label for="treble-cut">Static Treble Cut (Low-Pass): <strong><span id="treble-val">8.0</span> kHz</strong></label>
            </div>
            <input type="range" id="treble-cut" min="1000" max="20000" step="250" value="8000">
        </div>

        <div class="control-group">
            <div class="control-row">
                <label for="static-vol">Radio Static Volume: <strong><span id="static-val">25</span>%</strong></label>
            </div>
            <input type="range" id="static-vol" min="0" max="100" value="25">
        </div>
    </div>

    <div class="status" id="status-log">Connecting to open directory...</div>
</div>

<script>
    const BASE_API_URL = "https://de1.api.radio-browser.info/json/stations/search?limit=300&hidebroken=true&codec=mp3&order=clickcount";
    const POOL_SIZE = 8;
    
    let stations = [];
    let audioPool = [];
    
    let audioContext = null;
    let staticNode = null;
    let staticGain = null;
    let hpFilter = null;      
    let lpFilter = null;      
    let analyserNode = null; 
    let audioDataArray = null;
    
    let isSweeping = false;
    let sweepTimeout = null;
    let activeAudio = null;
    let isChannelAudioVoicing = false;

    // Speech Decoder Variables
    let speechRecognitionEngine = null;
    let isDecoderEnabled = false;

    const startBtn = document.getElementById('start-btn');
    const decoderBtn = document.getElementById('decoder-btn');
    const langSelect = document.getElementById('lang-select');
    const sweepRateInput = document.getElementById('sweep-rate');
    const rateVal = document.getElementById('rate-val');
    const bassInput = document.getElementById('bass-cut');
    const bassVal = document.getElementById('bass-val');
    const trebleInput = document.getElementById('treble-cut');
    const trebleVal = document.getElementById('treble-val');
    const staticVolInput = document.getElementById('static-vol');
    const staticVal = document.getElementById('static-val');
    const stationNameDiv = document.getElementById('station-name');
    const stationInfoDiv = document.getElementById('station-info');
    const statusLog = document.getElementById('status-log');
    const terminalLog = document.getElementById('terminal-log');
    const interimTextLine = document.getElementById('interim-text-line');
    
    const canvas = document.getElementById('scope');
    const canvasCtx = canvas.getContext('2d');

    function resizeCanvas() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    sweepRateInput.addEventListener('input', () => rateVal.textContent = sweepRateInput.value);
    
    bassInput.addEventListener('input', () => {
        bassVal.textContent = bassInput.value;
        if (hpFilter) hpFilter.frequency.setValueAtTime(parseFloat(bassInput.value), audioContext.currentTime);
    });

    trebleInput.addEventListener('input', () => {
        trebleVal.textContent = (trebleInput.value / 1000).toFixed(1);
        if (lpFilter) lpFilter.frequency.setValueAtTime(parseFloat(trebleInput.value), audioContext.currentTime);
    });

    staticVolInput.addEventListener('input', () => {
        staticVal.textContent = staticVolInput.value;
        if (staticGain) staticGain.gain.setValueAtTime((staticVolInput.value / 100) * 0.15, audioContext.currentTime);
    });

    langSelect.addEventListener('change', async () => {
        statusLog.textContent = "Reloading station directory filters...";
        await fetchStations();
        if (isSweeping && audioPool.length > 0) {
            audioPool.forEach(audioObj => assignRandomStation(audioObj));
        }
    });

    function initAudioEngine() {
        if (audioContext) return;
        
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        hpFilter = audioContext.createBiquadFilter();
        hpFilter.type = "highpass";
        hpFilter.frequency.setValueAtTime(parseFloat(bassInput.value), audioContext.currentTime);

        lpFilter = audioContext.createBiquadFilter();
        lpFilter.type = "lowpass";
        lpFilter.frequency.setValueAtTime(parseFloat(trebleInput.value), audioContext.currentTime);

        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 256; 
        audioDataArray = new Uint8Array(analyserNode.frequencyBinCount);

        hpFilter.connect(lpFilter);
        lpFilter.connect(analyserNode);
        analyserNode.connect(audioContext.destination);

        const bufferSize = 2 * audioContext.sampleRate;
        const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            output[i] = Math.random() * 2 - 1;
        }

        staticNode = audioContext.createBufferSource();
        staticNode.buffer = noiseBuffer;
        staticNode.loop = true;

        staticGain = audioContext.createGain();
        staticGain.gain.setValueAtTime((staticVolInput.value / 100) * 0.15, audioContext.currentTime);

        staticNode.connect(staticGain);
        staticGain.connect(hpFilter); 
        staticNode.start();

        renderScopeLoop();
    }

    // Initialize Web Speech Engine
    function initSpeechEngine() {
        const SpeechClass = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechClass) {
            logToTerminal("SYSTEM ERROR: Speech API not supported in this browser.");
            return;
        }

        speechRecognitionEngine = new SpeechClass();
        speechRecognitionEngine.continuous = true;
        speechRecognitionEngine.interimResults = true;
        // Forces English alignment matching target configuration parameters
        speechRecognitionEngine.lang = 'en-US'; 

        speechRecognitionEngine.onresult = (event) => {
            let interimTranscript = '';
            
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                const phrase = event.results[i][0].transcript.trim().toUpperCase();
                if (event.results[i].isFinal) {
                    if(phrase.length > 0) {
                        logToTerminal(`> ${phrase}`);
                    }
                } else {
                    interimTranscript += ' ' + phrase;
                }
            }
            interimTextLine.textContent = interimTranscript ? `>> ${interimTranscript}` : '';
        };

        speechRecognitionEngine.onerror = (event) => {
            console.error("Speech Engine Warning: ", event.error);
            // Auto recovers standard silence drop-offs smoothly
            if (event.error === 'no-speech' && isDecoderEnabled) {
                restartSpeechEngineSafely();
            }
        };

        speechRecognitionEngine.onend = () => {
            if (isDecoderEnabled) {
                restartSpeechEngineSafely();
            }
        };
    }

    function restartSpeechEngineSafely() {
        try { speechRecognitionEngine.stop(); } catch(e){}
        setTimeout(() => {
            if (isDecoderEnabled) speechRecognitionEngine.start();
        }, 300);
    }

    function logToTerminal(text) {
        const newLine = document.createElement('div');
        newLine.className = "terminal-line";
        newLine.textContent = text;
        // Appends lines right above the fluid input layout block
        terminalLog.insertBefore(newLine, interimTextLine.nextSibling);
    }

    function renderScopeLoop() {
        requestAnimationFrame(renderScopeLoop);
        
        const width = canvas.width;
        const height = canvas.height;
        
        canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.25)';
        canvasCtx.fillRect(0, 0, width, height);

        if (analyserNode) {
            analyserNode.getByteTimeDomainData(audioDataArray);
        }

        canvasCtx.lineWidth = 2.5;
        canvasCtx.strokeStyle = '#00ff66';
        canvasCtx.beginPath();

        const bufferLength = audioDataArray ? audioDataArray.length : 128;
        const sliceWidth = width / (bufferLength - 1);
        let x = 0;

        for (let i = 0; i < bufferLength; i++) {
            let v = audioDataArray ? (audioDataArray[i] / 128.0) - 1.0 : 0.0;

            if (isSweeping && isChannelAudioVoicing) {
                let norm = i / (bufferLength - 1);
                let centerEnvelope = Math.sin(norm * Math.PI); 
                let organicWave = Math.sin(norm * 2.0 + Date.now() * 0.03) * 0.6;
                let microJitter = (Math.random() * 0.4 - 0.2);
                v += centerEnvelope * (organicWave + microJitter);
            }

            v = Math.max(-0.92, Math.min(0.92, v));
            let y = (height / 2) + (v * (height / 2));

            if (i === 0) {
                canvasCtx.moveTo(x, y);
            } else {
                canvasCtx.lineTo(x, y);
            }
            x += sliceWidth;
        }

        if (!isSweeping && (!audioContext || audioContext.state !== 'running')) {
            canvasCtx.moveTo(0, height / 2);
            canvasCtx.lineTo(width, height / 2);
        }
        canvasCtx.stroke();
    }

    async function fetchStations() {
        try {
            const chosenLang = langSelect.value;
            let finalUrl = BASE_API_URL;
            if (chosenLang !== "all") finalUrl += `&language=${chosenLang}`;

            const response = await fetch(finalUrl);
            let rawStations = await response.json();
            
            const isHttpsMode = window.location.protocol === 'https:';
            if (isHttpsMode) {
                stations = rawStations.filter(s => (s.url_resolved || s.url).startsWith('https://'));
            } else {
                stations = rawStations;
            }
            statusLog.textContent = `Indexed ${stations.length} secure, online stations.`;
            if (stations.length === 0) throw new Error("No channels found.");
        } catch (error) {
            console.error(error);
            statusLog.textContent = "Directory sync failure. Retrying...";
            setTimeout(fetchStations, 5000);
        }
    }

    function assignRandomStation(audioObj) {
        if (!stations.length) return;
        const randomTarget = stations[Math.floor(Math.random() * stations.length)];
        
        audioObj.element.src = randomTarget.url_resolved || randomTarget.url;
        audioObj.element.stationData = randomTarget;
        audioObj.element.volume = 0;
        
        audioObj.element.play().catch(() => {});
    }

    function buildAudioPool() {
        if (audioPool.length > 0) return;

        for (let i = 0; i < POOL_SIZE; i++) {
            const audioEl = new Audio();
            audioEl.preload = "auto";
            
            const audioObj = {
                element: audioEl
            };

            audioEl.addEventListener('error', () => {
                if (isSweeping) assignRandomStation(audioObj);
            });

            assignRandomStation(audioObj);
            audioPool.push(audioObj);
        }
    }

    function executeSweep() {
        if (!isSweeping) return;

        if (activeAudio) {
            activeAudio.element.volume = 0;
            if (Math.random() < 0.50) {
                assignRandomStation(activeAudio);
            }
        }

        activeAudio = audioPool[Math.floor(Math.random() * audioPool.length)];

        if (activeAudio.element.readyState >= 2 && !activeAudio.element.error && !activeAudio.element.paused) {
            activeAudio.element.volume = 1.0; 
            isChannelAudioVoicing = true; 

            const cleanName = activeAudio.element.stationData.name.trim().toUpperCase().substring(0, 24);
            stationNameDiv.textContent = cleanName || "UNKNOWN SOURCE";
            stationInfoDiv.textContent = `CH: ${Math.floor(Math.random() * 800 + 100)} IP // LOC: ${activeAudio.element.stationData.countrycode || 'GLOBAL'}`;
        } else {
            isChannelAudioVoicing = false; 
            stationNameDiv.textContent = "--- DEAD AIR ---";
            stationInfoDiv.textContent = `TUNING RF INTERSTICES...`;
        }

        sweepTimeout = setTimeout(executeSweep, parseInt(sweepRateInput.value));
    }

    // Toggle Decoder Trigger
    decoderBtn.addEventListener('click', () => {
        if (!speechRecognitionEngine) {
            initSpeechEngine();
        }

        if (!speechRecognitionEngine) return;

        if (isDecoderEnabled) {
            isDecoderEnabled = false;
            speechRecognitionEngine.stop();
            decoderBtn.textContent = "ENABLE TEXT DECODER";
            decoderBtn.classList.remove('active-decoding');
            interimTextLine.textContent = '';
            logToTerminal("DECODER DISENGAGED.");
        } else {
            isDecoderEnabled = true;
            decoderBtn.textContent = "DISENGAGE DECODER";
            decoderBtn.classList.add('active-decoding');
            logToTerminal("INITIALIZING MICROPHONE CAPTURE...");
            try {
                speechRecognitionEngine.start();
            } catch(e) {
                console.log(e);
            }
        }
    });

    startBtn.addEventListener('click', async () => {
        if (!audioContext) {
            initAudioEngine();
        }
        
        if (isSweeping) {
            isSweeping = false;
            isChannelAudioVoicing = false;
            clearTimeout(sweepTimeout);
            audioPool.forEach(a => a.element.volume = 0);
            if (activeAudio) activeAudio.volume = 0;
            
            if (audioContext && audioContext.state === 'running') {
                await audioContext.suspend();
            }
            
            startBtn.textContent = "START SWEEP";
            stationNameDiv.textContent = "SWEEP HALTED";
            stationInfoDiv.textContent = "SYSTEM STANDBY";
        } else {
            if (stations.length === 0) {
                statusLog.textContent = "Awaiting directory sync connection...";
                return;
            }
            if (audioContext && audioContext.state === 'suspended') {
                await audioContext.resume();
            }
            buildAudioPool();
            isSweeping = true;
            startBtn.textContent = "STOP SWEEP";
            executeSweep();
        }
    });

    fetchStations();
    renderScopeLoop();
</script>

</body>
</html>
