<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute Magnetic Orientation Sonograph</title>
    <style>
        :root {
            --bg-color: #111113;
            --panel-color: #17171c;
            --accent-color: #ff9900;
            --alert-color: #ff3333;
            --text-color: #e2e2e8;
        }

        body {
            margin: 0;
            padding: 15px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 1.4rem;
            letter-spacing: 0.5px;
            color: #fff;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            background: #25252b;
            font-weight: bold;
        }

        .status-active { color: var(--accent-color); background: rgba(255, 153, 0, 0.1); }
        .status-alert { color: var(--alert-color); background: rgba(255, 51, 51, 0.1); animation: pulse 1s infinite alternate; }

        @keyframes pulse {
            from { opacity: 0.6; }
            to { opacity: 1; }
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        @media (max-width: 600px) {
            .dashboard { grid-template-columns: 1fr; }
        }

        .panel {
            background-color: var(--panel-color);
            border: 1px solid #26262e;
            border-radius: 8px;
            padding: 15px;
        }

        .readout {
            font-size: 2.6rem;
            font-weight: 700;
            font-family: monospace;
            text-align: center;
            margin: 15px 0;
            color: #fff;
        }

        .unit { font-size: 1.1rem; color: #888; font-weight: normal; }

        .axes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            text-align: center;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .axis { padding: 6px; background: #1f1f26; border-radius: 4px; }
        .axis span { display: block; color: #888; font-size: 0.75rem; }

        .controls label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .controls input {
            width: 100%;
            padding: 8px;
            background: #1f1f26;
            border: 1px solid #363642;
            border-radius: 4px;
            color: #fff;
            margin-top: 4px;
            box-sizing: border-box;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.95rem;
        }

        .btn-start { background-color: var(--accent-color); color: #000; }
        .btn-start:hover { background-color: #ffaa22; }
        .btn-stop { background-color: #2c2c35; color: #fff; }
        .btn-stop:hover { background-color: #3a3a46; }
        .btn-export { background-color: #2196F3; color: #fff; grid-column: span 2; }

        canvas {
            width: 100%;
            height: 220px;
            background-color: #070709;
            border-radius: 8px;
            border: 1px solid #26262e;
            display: block;
            margin-bottom: 15px;
        }

        .log-panel {
            max-height: 140px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            background: #070709;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #26262e;
        }

        .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid #14141a;
            display: flex;
            justify-content: space-between;
        }
        .log-entry.alert-row { color: var(--alert-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Absolute Geo-Magnetic Compass Tracker</h1>
        <div id="statusBadge" class="status-badge">System Initialized</div>
    </header>

    <canvas id="sonographCanvas"></canvas>

    <div class="dashboard">
        <div class="panel">
            <h3>Magnetic Heading</h3>
            <div class="readout" id="headingReadout">0.00 <span class="unit">° Z (α)</span></div>
            <div class="axes-grid">
                <div class="axis"><span id="valBeta">0.00°</span><span>Pitch (β)</span></div>
                <div class="axis"><span id="valGamma">0.00°</span><span>Roll (γ)</span></div>
            </div>
        </div>

        <div class="panel controls">
            <h3>Fluctuation Alert</h3>
            <label>
                Tolerance Window ($\Delta$ Degrees):
                <input type="number" id="toleranceInput" value="3.0" step="0.1" min="0.1">
            </label>
            <label>
                Duration Window (Seconds):
                <input type="number" id="durationInput" value="4" step="1" min="1">
            </label>
            <div class="btn-group">
                <button class="btn-start" id="startBtn">Connect Stream</button>
                <button class="btn-stop" id="stopBtn" disabled>Disconnect</button>
                <button class="btn-export" id="exportBtn" disabled>Export Time Log (.CSV)</button>
            </div>
        </div>
    </div>

    <div class="panel">
        <h3>Live Event Stream</h3>
        <div class="log-panel" id="logPanel">
            <div style="color: #666;">Waiting for hardware calibration activation sequence...</div>
        </div>
    </div>
</div>

<script>
    let isMonitoring = false;
    let dataHistory = []; 
    let plotPoints = [];
    const maxPlotPoints = 300;
    let audioCtx = null;
    let alertActive = false;

    const canvas = document.getElementById('sonographCanvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const exportBtn = document.getElementById('exportBtn');
    const toleranceInput = document.getElementById('toleranceInput');
    const durationInput = document.getElementById('durationInput');
    const statusBadge = document.getElementById('statusBadge');
    const logPanel = document.getElementById('logPanel');

    function resizeCanvas() {
        canvas.width = canvas.clientWidth * window.devicePixelRatio;
        canvas.height = canvas.clientHeight * window.devicePixelRatio;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playAlertTone() {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5 note 
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
    }

    startBtn.addEventListener('click', async () => {
        initAudio();
        
        // Confirm fallback interface availability
        if (!('ondeviceorientationabsolute' in window) && !('ondeviceorientation' in window)) {
            updateStatus("APIs Blocked/Missing", "status-alert");
            alert("This device context does not support Web Orientation interface tracking loops.");
            return;
        }

        try {
            // Standardizing cross-browser modern security permission requests
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const response = await DeviceOrientationEvent.requestPermission();
                if (response !== 'granted') {
                    alert("Hardware telemetry streaming access was explicitly denied.");
                    return;
                }
            }

            // Bind to the absolute hardware event pipeline (forces magnetometer stream usage)
            if ('ondeviceorientationabsolute' in window) {
                window.addEventListener('deviceorientationabsolute', handleOrientationReading, true);
            } else {
                window.addEventListener('deviceorientation', handleOrientationReading, true);
            }

            isMonitoring = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            exportBtn.disabled = false;
            updateStatus("Streaming Absolute Data", "status-active");
            logPanel.innerHTML = ""; 
            animatePlot();

        } catch (err) {
            console.error(err);
            updateStatus("Stream Failure", "status-alert");
        }
    });

    stopBtn.addEventListener('click', () => {
        if ('ondeviceorientationabsolute' in window) {
            window.removeEventListener('deviceorientationabsolute', handleOrientationReading, true);
        } else {
            window.removeEventListener('deviceorientation', handleOrientationReading, true);
        }
        isMonitoring = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        updateStatus("Stream Paused", "");
    } );

    function updateStatus(text, className) {
        statusBadge.textContent = text;
        statusBadge.className = "status-badge " + className;
    }

    function handleOrientationReading(e) {
        if (!isMonitoring) return;

        const now = Date.now();
        // Alpha represents vector rotation around the physical device Z-axis [0 to 360 degrees)
        const alpha = e.alpha !== null ? e.alpha : 0;
        const beta = e.beta !== null ? e.beta : 0;
        const gamma = e.gamma !== null ? e.gamma : 0;

        document.getElementById('headingReadout').innerHTML = `${alpha.toFixed(2)}<span class="unit">°</span>`;
        document.getElementById('valBeta').textContent = `${beta.toFixed(1)}°`;
        document.getElementById('valGamma').textContent = `${gamma.toFixed(1)}°`;

        const record = {
            epoch: now,
            isoString: new Date(now).toISOString(),
            alpha: alpha.toFixed(4),
            beta: beta.toFixed(4),
            gamma: gamma.toFixed(4),
            alertTriggered: false
        };

        dataHistory.push(record);
        plotPoints.push(alpha);
        if (plotPoints.length > maxPlotPoints) plotPoints.shift();

        evaluateAlertWindow(now, alpha, record);
    }

    function evaluateAlertWindow(currentTime, currentAlpha, currentRecord) {
        const durationSec = parseFloat(durationInput.value) || 4;
        const tolerance = parseFloat(toleranceInput.value) || 3;
        const windowThresholdMs = durationSec * 1000;

        let minVal = currentAlpha;
        let maxVal = currentAlpha;

        for (let i = dataHistory.length - 1; i >= 0; i--) {
            if (currentTime - dataHistory[i].epoch > windowThresholdMs) break;
            
            const aVal = parseFloat(dataHistory[i].alpha);
            
            // Basic adjustment handling for angular wrapped boundaries
            if (Math.abs(aVal - currentAlpha) < 180) {
                if (aVal < minVal) minVal = aVal;
                if (aVal > maxVal) maxVal = aVal;
            }
        }

        const delta = maxVal - minVal;

        if (delta > tolerance) {
            currentRecord.alertTriggered = true;
            if (!alertActive) {
                alertActive = true;
                updateStatus("VECTOR DEFLECTION DETECTED", "status-alert");
                playAlertTone();
                appendLogEntry(`[SHIFT] Deflection: ${delta.toFixed(2)}° deviation over ${durationSec}s`, true);
            }
        } else {
            if (alertActive) {
                alertActive = false;
                updateStatus("Streaming Absolute Data", "status-active");
            }
        }
    }

    function appendLogEntry(message, isAlert = false) {
        const entry = document.createElement('div');
        entry.className = `log-entry ${isAlert ? 'alert-row' : ''}`;
        
        const timeSpan = document.createElement('span');
        timeSpan.textContent = new Date().toLocaleTimeString();
        
        const msgSpan = document.createElement('span');
        msgSpan.textContent = message;
        
        entry.appendChild(timeSpan);
        entry.appendChild(msgSpan);
        logPanel.insertBefore(entry, logPanel.firstChild);
    }

    function animatePlot() {
        if (!isMonitoring) return;

        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);

        ctx.strokeStyle = '#1a1a22';
        ctx.lineWidth = 1;
        for (let i = 0; i < h; i += h / 5) {
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(w, i);
            ctx.stroke();
        }

        if (plotPoints.length > 1) {
            ctx.beginPath();
            ctx.lineWidth = 3;
            
            const maxVal = Math.max(...plotPoints) + 2; 
            const minVal = Math.min(...plotPoints) - 2;
            const range = (maxVal - minVal) || 1;

            ctx.strokeStyle = alertActive ? '#ff3333' : '#ff9900';

            for (let i = 0; i < plotPoints.length; i++) {
                const xPos = (i / (maxPlotPoints - 1)) * w;
                const yPos = h - ((plotPoints[i] - minVal) / range) * h; 

                if (i === 0) ctx.moveTo(xPos, yPos);
                else ctx.lineTo(xPos, yPos);
            }
            ctx.stroke();

            ctx.lineTo(w * (plotPoints.length - 1) / (maxPlotPoints - 1), h);
            ctx.lineTo(0, h);
            ctx.fillStyle = alertActive ? 'rgba(255, 51, 51, 0.03)' : 'rgba(255, 153, 0, 0.03)';
            ctx.fill();
        }

        requestAnimationFrame(animatePlot);
    }

    exportBtn.addEventListener('click', () => {
        if (dataHistory.length === 0) return;

        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += "Timestamp (ISO),Epoch (ms),Heading Alpha (deg),Pitch Beta (deg),Roll Gamma (deg),Threshold Breach\n";

        dataHistory.forEach(r => {
            csvContent += `${r.isoString},${r.epoch},${r.alpha},${r.beta},${r.gamma},${r.alertTriggered}\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `absolute_orientation_${Date.now()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });
</script>

</body>
</html>
