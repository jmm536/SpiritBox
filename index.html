<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Radio Spirit Box (Unbrickable AI Engine)</title>
    <style>
        body {
            background-color: #121212;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        .container {
            border: 2px solid #00ff66;
            padding: 20px;
            background-color: #1a1a1a;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.15);
            border-radius: 8px;
            width: 100%;
            max-width: 460px;
        }
        h1 {
            text-align: center;
            margin-top: 0;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
            font-size: 1.3rem;
            letter-spacing: 2px;
        }
        .display {
            background-color: #000;
            border: 1px solid #00ff66;
            padding: 12px;
            height: 70px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 1rem;
            overflow: hidden;
            border-radius: 4px;
        }
        .scope-container {
            background-color: #000;
            border: 1px solid #00ff66;
            border-radius: 4px;
            width: 100%;
            height: 100px;
            margin-bottom: 15px;
            box-sizing: border-box;
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .terminal-container {
            background-color: #050505;
            border: 1px solid #00ff66;
            border-radius: 4px;
            height: 120px;
            padding: 10px;
            margin-bottom: 15px;
            overflow-y: auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column-reverse; 
        }
        .terminal-line {
            font-size: 0.8rem;
            line-height: 1.3;
            color: #00ff66;
        }
        .terminal-line.ai-log {
            color: #00fffa;
            font-weight: bold;
            text-shadow: 0 0 3px rgba(0, 255, 250, 0.4);
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .control-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
        }
        button {
            background-color: #00ff66;
            color: #000;
            border: none;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
            letter-spacing: 1px;
            -webkit-tap-highlight-color: transparent;
        }
        button:disabled {
            background-color: #224422;
            color: #446644;
            cursor: not-allowed;
        }
        button:hover:not(:disabled) {
            background-color: #00cc52;
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.6);
        }
        button.active-decoding {
            background-color: #ff3333;
            color: #fff;
        }
        input[type="range"], select {
            width: 100%;
            accent-color: #00ff66;
        }
        select {
            background-color: #000;
            color: #00ff66;
            border: 1px solid #00ff66;
            padding: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            border-radius: 4px;
            outline: none;
        }
        .status {
            font-size: 0.7rem;
            color: #666;
            text-align: center;
            margin-top: 15px;
            border-top: 1px dashed #333;
            padding-top: 8px;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js"></script>
</head>
<body>

<div class="container">
    <h1>IP-SPIRIT BOX v4.5 // HARDENED AI</h1>
    
    <div class="display" id="display">
        <div id="station-name">SYSTEM READY</div>
        <div id="station-info" style="font-size: 0.75rem; color: #00aa44; margin-top: 4px;">TAP START TO WORK BANDS</div>
    </div>

    <div class="scope-container">
        <canvas id="scope"></canvas>
    </div>

    <div class="terminal-container" id="terminal-log">
        <div class="terminal-line" id="interim-text-line">Initializing Audio Pipeline...</div>
    </div>

    <div class="controls">
        <button id="start-btn">START SWEEP</button>
        <button id="decoder-btn" disabled>AWAITING INLINE AI LINK...</button>
        
        <div class="control-group">
            <div class="control-row">
                <label for="lang-select">Language Filter Matrix:</label>
            </div>
            <select id="lang-select">
                <option value="all">All Global Languages (Random Mix)</option>
                <option value="english" selected>English Only</option>
            </select>
        </div>

        <div class="control-group">
            <div class="control-row">
                <label for="sweep-rate">Sweep Rate: <strong><span id="rate-val">200</span>ms</strong></label>
            </div>
            <input type="range" id="sweep-rate" min="50" max="1000" step="25" value="200">
        </div>

        <div class="control-group">
            <div class="control-row">
                <label for="bass-cut">Master Bass Cut: <strong><span id="bass-val">150</span> Hz</strong></label>
            </div>
            <input type="range" id="bass-cut" min="20" max="800" step="10" value="150">
        </div>

        <div class="control-group">
            <div class="control-row">
                <label for="treble-cut">Master Treble Cut: <strong><span id="treble-val">8.0</span> kHz</strong></label>
            </div>
            <input type="range" id="treble-cut" min="2000" max="20000" step="500" value="8000">
        </div>

        <div class="control-group">
            <div class="control-row">
                <label for="static-vol">Radio Static Volume: <strong><span id="static-val">25</span>%</strong></label>
            </div>
            <input type="range" id="static-vol" min="0" max="100" value="25">
        </div>
    </div>

    <div class="status" id="status-log">Connecting to open directory...</div>
</div>

<script>
    const BASE_API_URL = "https://de1.api.radio-browser.info/json/stations/search?limit=150&hidebroken=true&codec=mp3&order=clickcount";
    const POOL_SIZE = 4;
    
    let stations = [];
    let audioPool = [];
    
    let audioContext = null;
    let staticNode = null;
    let staticGain = null;
    let hpFilter = null;      
    let lpFilter = null;      
    let analyserNode = null; 
    let audioDataArray = null;
    
    let recorderNode = null;
    let rawAudioAccumulator = [];
    let isAiDecoderActive = false;
    let isAiEngineBusy = false;
    let whisperTranscriber = null;

    let isSweeping = false;
    let sweepTimeout = null;
    let activeAudio = null;
    let isChannelAudioVoicing = false;

    const startBtn = document.getElementById('start-btn');
    const decoderBtn = document.getElementById('decoder-btn');
    const langSelect = document.getElementById('lang-select');
    const sweepRateInput = document.getElementById('sweep-rate');
    const rateVal = document.getElementById('rate-val');
    const bassInput = document.getElementById('bass-cut');
    const bassVal = document.getElementById('bass-val');
    const trebleInput = document.getElementById('treble-cut');
    const trebleVal = document.getElementById('treble-val');
    const staticVolInput = document.getElementById('static-vol');
    const staticVal = document.getElementById('static-val');
    const stationNameDiv = document.getElementById('station-name');
    const stationInfoDiv = document.getElementById('station-info');
    const statusLog = document.getElementById('status-log');
    const terminalLog = document.getElementById('terminal-log');
    const interimTextLine = document.getElementById('interim-text-line');
    
    const canvas = document.getElementById('scope');
    const canvasCtx = canvas.getContext('2d');

    function resizeCanvas() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    sweepRateInput.addEventListener('input', () => rateVal.textContent = sweepRateInput.value);
    
    bassInput.addEventListener('input', () => {
        bassVal.textContent = bassInput.value;
        if (hpFilter) hpFilter.frequency.setValueAtTime(parseFloat(bassInput.value), audioContext.currentTime);
    });

    trebleInput.addEventListener('input', () => {
        trebleVal.textContent = (trebleInput.value / 1000).toFixed(1);
        if (lpFilter) lpFilter.frequency.setValueAtTime(parseFloat(trebleInput.value), audioContext.currentTime);
    });

    staticVolInput.addEventListener('input', () => {
        staticVal.textContent = staticVolInput.value;
        if (staticGain) staticGain.gain.setValueAtTime((staticVolInput.value / 100) * 0.12, audioContext.currentTime);
    });

    langSelect.addEventListener('change', async () => {
        statusLog.textContent = "Updating multiplex directories...";
        await fetchStations();
        if (isSweeping && audioPool.length > 0) {
            audioPool.forEach(audioObj => assignRandomStation(audioObj));
        }
    });

    function logToTerminal(text, isAiResult = false) {
        const newLine = document.createElement('div');
        newLine.className = isAiResult ? "terminal-line ai-log" : "terminal-line";
        newLine.textContent = text;
        terminalLog.insertBefore(newLine, interimTextLine.nextSibling);
    }

    // Hardened, Flattened AI Initialization
    async function initHardenenedAiEngine() {
        try {
            // Target the script tag global namespace context directly
            if (!window.Xenova || !window.Xenova.pipeline) {
                setTimeout(initHardenenedAiEngine, 200);
                return;
            }
            
            decoderBtn.textContent = "DOWNLOADING AI MODEL (~75MB)...";
            logToTerminal("DOWNLOADING COMPRESSED SPEECH NETWORK PARALLEL MODEL...");
            
            const { pipeline, env } = window.Xenova;
            env.allowLocalModels = false;

            // Instantiates model structure cleanly across standard environments
            whisperTranscriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny.en', {
                quantized: true
            });

            logToTerminal("AI WAVEFORM NETWORK INITIALIZED AND ONLINE.");
            decoderBtn.textContent = "ENABLE AI WAVEFORM DECODER";
            decoderBtn.disabled = false;
            interimTextLine.textContent = "AI Core Ready.";
        } catch (err) {
            decoderBtn.textContent = "AI INITIALIZATION FAILED";
            logToTerminal(`ERROR CHECK: ${err.message}`);
        }
    }

    function initAudioEngine() {
        if (audioContext) return;
        
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        hpFilter = audioContext.createBiquadFilter();
        hpFilter.type = "highpass";
        hpFilter.frequency.setValueAtTime(parseFloat(bassInput.value), audioContext.currentTime);

        lpFilter = audioContext.createBiquadFilter();
        lpFilter.type = "lowpass";
        lpFilter.frequency.setValueAtTime(parseFloat(trebleInput.value), audioContext.currentTime);

        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 128; 
        audioDataArray = new Uint8Array(analyserNode.frequencyBinCount);

        hpFilter.connect(lpFilter);
        lpFilter.connect(analyserNode);
        analyserNode.connect(audioContext.destination);

        recorderNode = audioContext.createScriptProcessor(4096, 1, 1);
        lpFilter.connect(recorderNode);
        recorderNode.connect(audioContext.destination);

        recorderNode.onaudioprocess = (e) => {
            if (!isAiDecoderActive || !isSweeping || isAiEngineBusy) return;
            const inputData = e.inputBuffer.getChannelData(0);
            rawAudioAccumulator.push(...inputData);

            // MOBILE SPEED UPGRADE: Tightened the window to 2-second sampling blocks
            const sampleCeiling = audioContext.sampleRate * 2; 
            if (rawAudioAccumulator.length >= sampleCeiling) {
                const chunkToProcess = new Float32Array(rawAudioAccumulator);
                rawAudioAccumulator = []; 
                
                setTimeout(() => evaluateGateAndDispatch(chunkToProcess), 0);
            }
        };

        const bufferSize = 2 * audioContext.sampleRate;
        const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            output[i] = Math.random() * 2 - 1;
        }

        staticNode = audioContext.createBufferSource();
        staticNode.buffer = noiseBuffer;
        staticNode.loop = true;

        staticGain = audioContext.createGain();
        staticGain.gain.setValueAtTime((staticVolInput.value / 100) * 0.12, audioContext.currentTime);

        staticNode.connect(staticGain);
        staticGain.connect(hpFilter); 
        staticNode.start();

        renderScopeLoop();
    }

    function evaluateGateAndDispatch(floatArray) {
        if (!whisperTranscriber || isAiEngineBusy) return;

        const totalSamples = floatArray.length;
        const windowSize = Math.floor(totalSamples / 10);
        let rmsValues = [];

        for (let w = 0; w < 10; w++) {
            let sumSquares = 0;
            let startIdx = w * windowSize;
            for (let i = startIdx; i < startIdx + windowSize; i++) {
                sumSquares += floatArray[i] * floatArray[i];
            }
            rmsValues.push(Math.sqrt(sumSquares / windowSize));
        }

        const deltaRMS = Math.max(...rmsValues) - Math.min(...rmsValues);

        if (deltaRMS > 0.045 && isChannelAudioVoicing) {
            isAiEngineBusy = true;
            interimTextLine.textContent = "[PROCESSING WAVEFORM...]";
            
            setTimeout(async () => {
                try {
                    const downsampled = downsample(floatArray, audioContext.sampleRate);
                    const response = await whisperTranscriber(downsampled, {
                        chunk_length_s: 30,
                        stride_length_s: 5,
                        return_timestamps: false
                    });

                    const cleanText = response.text
                        .replace(/\[.*?\]/g, "")
                        .replace(/\(.*?\)/g, "")
                        .replace(/[^a-zA-Z\s]/g, "")
                        .trim()
                        .toUpperCase();

                    if (cleanText.length > 2) {
                        logToTerminal(`[AI]: ${cleanText}`, true);
                    }
                } catch (err) {
                    console.error(err);
                } finally {
                    isAiEngineBusy = false;
                    interimTextLine.textContent = isAiDecoderActive ? "[AI WAVEFORM ANALYSIS ACTIVE]" : "";
                }
            }, 10);
        }
    }

    function downsample(buffer, inputSampleRate) {
        const targetSampleRate = 16000;
        if (inputSampleRate === targetSampleRate) return buffer;
        const ratio =
