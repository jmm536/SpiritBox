<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spirit Box // Forced-Wake Edition</title>
    <style>
        body { background-color: #121212; color: #00ff66; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; }
        .container { border: 2px solid #00ff66; padding: 20px; background: #1a1a1a; border-radius: 8px; width: 100%; max-width: 460px; }
        .display { background: #000; border: 1px solid #00ff66; padding: 10px; margin-bottom: 10px; text-align: center; font-size: 0.9rem; }
        .scope-container { background: #000; border: 1px solid #00ff66; width: 100%; height: 80px; margin-bottom: 10px; }
        canvas { width: 100%; height: 100%; }
        button { background: #00ff66; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 1.1rem; }
        .debug { font-size: 0.7rem; color: #ff3333; text-align: center; margin-top: 10px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js"></script>
</head>
<body>

<div class="container">
    <h1>IP-BOX // WAKE-LOCK</h1>
    <div class="display" id="display">
        <div id="status-text">SYSTEM STANDBY</div>
    </div>
    <div class="scope-container"><canvas id="scope"></canvas></div>
    <button id="start-btn">TAP TO WAKE & START</button>
    <div id="debug-log" class="debug"></div>
</div>

<script>
    let audioContext = null;
    let isSweeping = false;
    let audioPool = [];
    let hpFilter, lpFilter, analyserNode;
    
    const startBtn = document.getElementById('start-btn');
    const debugLog = document.getElementById('debug-log');
    const statusText = document.getElementById('status-text');

    async function initAudio() {
        // FORCED WAKE-LOCK: Resume context on every single tap
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        if (audioContext.state === 'suspended') {
            await audioContext.resume();
            debugLog.textContent = "AudioContext Resumed.";
        }

        if (!hpFilter) {
            hpFilter = audioContext.createBiquadFilter();
            hpFilter.type = "highpass";
            hpFilter.frequency.value = 150;
            
            lpFilter = audioContext.createBiquadFilter();
            lpFilter.type = "lowpass";
            lpFilter.frequency.value = 8000;
            
            analyserNode = audioContext.createAnalyser();
            analyserNode.fftSize = 128;
            
            hpFilter.connect(lpFilter);
            lpFilter.connect(analyserNode);
            analyserNode.connect(audioContext.destination);
        }
    }

    startBtn.addEventListener('click', async () => {
        await initAudio();
        
        if (audioContext.state !== 'running') {
            debugLog.textContent = "Audio blocked by browser. Tap again.";
            return;
        }

        if (!isSweeping) {
            isSweeping = true;
            startBtn.textContent = "STOP SWEEP";
            statusText.textContent = "SWEEPING...";
            startSweepLoop();
        } else {
            isSweeping = false;
            startBtn.textContent = "START SWEEP";
            statusText.textContent = "SYSTEM STANDBY";
        }
    });

    function startSweepLoop() {
        if (!isSweeping) return;
        // Simple test tone to verify audio works
        const osc = audioContext.createOscillator();
        osc.connect(hpFilter);
        osc.start();
        osc.stop(audioContext.currentTime + 0.1);
        setTimeout(startSweepLoop, 200);
    }

    // Basic Scope Loop
    const canvas = document.getElementById('scope');
    const ctx = canvas.getContext('2d');
    function draw() {
        requestAnimationFrame(draw);
        ctx.fillStyle = '#000';
        ctx.fillRect(0,0,canvas.width, canvas.height);
        if(analyserNode) {
            const data = new Uint8Array(analyserNode.frequencyBinCount);
            analyserNode.getByteTimeDomainData(data);
            ctx.strokeStyle = '#00ff66';
            ctx.beginPath();
            for(let i=0; i<data.length; i++) {
                ctx.lineTo(i * (canvas.width/data.length), (data[i]/255) * canvas.height);
            }
            ctx.stroke();
        }
    }
    draw();
</script>
</body>
</html>
