<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Radio Spirit Box (Hybrid Engine)</title>
    <style>
        body {
            background-color: #121212;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            border: 2px solid #00ff66;
            padding: 25px;
            background-color: #1a1a1a;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            border-radius: 8px;
            width: 100%;
            max-width: 520px;
        }
        h1 {
            text-align: center;
            margin-top: 0;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
            font-size: 1.6rem;
            letter-spacing: 2px;
        }
        .display {
            background-color: #000;
            border: 1px solid #00ff66;
            padding: 15px;
            height: 90px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 1.2rem;
            overflow: hidden;
            border-radius: 4px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .control-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }
        button {
            background-color: #00ff66;
            color: #000;
            border: none;
            padding: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
            letter-spacing: 1px;
        }
        button:hover {
            background-color: #00cc52;
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.6);
        }
        input[type="range"], select {
            width: 100%;
            accent-color: #00ff66;
            cursor: pointer;
        }
        select {
            background-color: #000;
            color: #00ff66;
            border: 1px solid #00ff66;
            padding: 10px;
            font-family: inherit;
            font-size: 1rem;
            border-radius: 4px;
            outline: none;
        }
        .status {
            font-size: 0.75rem;
            color: #888;
            text-align: center;
            margin-top: 20px;
            border-top: 1px dashed #333;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>IP-SPIRIT BOX v3.3 // HYBRID</h1>
    
    <div class="display" id="display">
        <div id="station-name">SYSTEM READY</div>
        <div id="station-info" style="font-size: 0.8rem; color: #00aa44; margin-top: 8px;">PRESS START TO WORK BANDS</div>
    </div>

    <div class="controls">
        <button id="start-btn">START SWEEP</button>
        
        <div class="control-group">
            <div class="control-row">
                <label for="lang-select">Language Filter Matrix:</label>
            </div>
            <select id="lang-select">
                <option value="all">All Global Languages (Random Mix)</option>
                <option value="english" selected>English Only</option>
            </select>
        </div>

        <div class="control-group">
            <div class="control-row">
                <label for="sweep-rate">Sweep Rate: <strong><span id="rate-val">200</span>ms</strong></label>
            </div>
            <input type="range" id="sweep-rate" min="50" max="1000" step="25" value="200">
        </div>

        <div class="control-group">
            <div class="control-row">
                <label for="formant-shift">Static Formant Shifter: <strong><span id="formant-val">Neutral</span></strong></label>
            </div>
            <input type="range" id="formant-shift" min="0" max="100" value="50">
        </div>

        <div class="control-group">
            <div class="control-row">
                <label for="bass-cut">Static Bass Cut (High-Pass): <strong><span id="bass-val">150</span> Hz</strong></label>
            </div>
            <input type="range" id="bass-cut" min="20" max="1200" step="10" value="150">
        </div>

        <div class="control-group">
            <div class="control-row">
                <label for="treble-cut">Static Treble Cut (Low-Pass): <strong><span id="treble-val">8.0</span> kHz</strong></label>
            </div>
            <input type="range" id="treble-cut" min="1000" max="20000" step="250" value="8000">
        </div>

        <div class="control-group">
            <div class="control-row">
                <label for="static-vol">Radio Static Volume: <strong><span id="static-val">25</span>%</strong></label>
            </div>
            <input type="range" id="static-vol" min="0" max="100" value="25">
        </div>
    </div>

    <div class="status" id="status-log">Connecting to open directory...</div>
</div>

<script>

    const POOL_SIZE = 8;

    let audioPool = [];
    
    let audioContext = null;
    let staticNode = null;
    let staticGain = null;
    let hpFilter = null;      
    let lpFilter = null;      
    let formantFilterL = null;
    let formantFilterH = null;
    
    let isSweeping = false;
    let sweepTimeout = null;
    let activeAudio = null;

    const startBtn = document.getElementById('start-btn');
    const langSelect = document.getElementById('lang-select');
    const sweepRateInput = document.getElementById('sweep-rate');
    const rateVal = document.getElementById('rate-val');
    const formantInput = document.getElementById('formant-shift');
    const formantVal = document.getElementById('formant-val');
    const bassInput = document.getElementById('bass-cut');
    const bassVal = document.getElementById('bass-val');
    const trebleInput = document.getElementById('treble-cut');
    const trebleVal = document.getElementById('treble-val');
    const staticVolInput = document.getElementById('static-vol');
    const staticVal = document.getElementById('static-val');
    const stationNameDiv = document.getElementById('station-name');
    const stationInfoDiv = document.getElementById('station-info');
    const statusLog = document.getElementById('status-log
