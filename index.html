<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Radio Spirit Box (AI Waveform Decoder)</title>
    <style>
        body {
            background-color: #121212;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            border: 2px solid #00ff66;
            padding: 25px;
            background-color: #1a1a1a;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            border-radius: 8px;
            width: 100%;
            max-width: 520px;
        }
        h1 {
            text-align: center;
            margin-top: 0;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
            font-size: 1.4rem;
            letter-spacing: 2px;
        }
        .display {
            background-color: #000;
            border: 1px solid #00ff66;
            padding: 15px;
            height: 75px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 1.1rem;
            overflow: hidden;
            border-radius: 4px;
        }
        .scope-container {
            background-color: #000;
            border: 1px solid #00ff66;
            border-radius: 4px;
            width: 100%;
            height: 120px;
            margin-bottom: 10px;
            box-sizing: border-box;
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .terminal-container {
            background-color: #050505;
            border: 1px solid #00ff66;
            border-radius: 4px;
            height: 130px;
            padding: 10px;
            margin-bottom: 20px;
            overflow-y: auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column-reverse; 
        }
        .terminal-line {
            font-size: 0.85rem;
            line-height: 1.3;
            color: #00ff66;
            text-shadow: 0 0 4px rgba(0, 255, 102, 0.3);
        }
        .terminal-line.ai-log {
            color: #00fffa;
            text-shadow: 0 0 4px rgba(0, 255, 250, 0.4);
            font-weight: bold;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .control-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }
        button {
            background-color: #00ff66;
            color: #000;
            border: none;
            padding: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
            letter-spacing: 1px;
        }
        button:disabled {
            background-color: #224422;
            color: #446644;
            cursor: not-allowed;
        }
        button:hover:not(:disabled) {
            background-color: #00cc52;
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.6);
        }
        button.active-decoding {
            background-color: #ff3333;
            color: #fff;
        }
        input[type="range"], select {
            width: 100%;
            accent-color: #00ff66;
            cursor: pointer;
        }
        select {
            background-color: #000;
            color: #00ff66;
            border: 1px solid #00ff66;
            padding: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            border-radius: 4px;
            outline: none;
        }
        .status {
            font-size: 0.75rem;
            color: #888;
            text-align: center;
            margin-top: 15px;
            border-top: 1px dashed #333;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>IP-SPIRIT BOX v4.0 // WHISPER AI</h1>
    
    <div class="display" id="display">
        <div id="station-name">SYSTEM READY</div>
        <div id="station-info" style="font-size: 0.8rem; color: #00aa44; margin-top: 4px;">PRESS START TO WORK BANDS</div>
    </div>

    <div class="scope-container">
        <canvas id="scope"></canvas>
    </div>

    <div class="terminal-container" id="terminal-log">
        <div class="terminal-line" id="interim-text-line">AI Core Standby.</div>
    </div>

    <div class="controls">
        <button id="start-btn">START SWEEP</button>
        <button id="decoder-btn" disabled>LOADING AI MODEL (75MB)...</button>
        
        <div class="control-group">
            <div class="control-row">
                <label for="lang-select">Language Filter Matrix:</label>
            </div>
            <select id="lang-select">
                <option value="all">All Global Languages (Random Mix)</option>
                <option value="english" selected>English Only</option>
            </select>
        </div>

        <div class="control-group">
            <div class="control-row">
                <label for="sweep-rate">Sweep Rate: <strong><span id="rate-val">200</span>ms</strong></label>
            </div>
            <input type="range" id="sweep-rate" min="50" max="1000" step="25" value="200">
        </div>

        <div class="control-group">
            <div class="control-row">
                <label for="bass-cut">Master Bass Cut (High-Pass): <strong><span id="bass-val">150</span> Hz</strong></label>
            </div>
            <input type="range" id="bass-cut" min="20" max="1200" step="10" value="150">
        </div>

        <div class="control-group">
            <div class="control-row">
                <label for="treble-cut">Master Treble Cut (Low-Pass): <strong><span id="treble-val">8.0</span> kHz</strong></label>
            </div>
            <input type="range" id="treble-cut" min="1000" max="20000" step="250" value="8000">
        </div>

        <div class="control-group">
            <div class="control-row">
                <label for="static-vol">Radio Static Volume: <strong><span id="static-val">25</span>%</strong></label>
            </div>
            <input type="range" id="static-vol" min="0" max="100" value="25">
        </div>
    </div>

    <div class="status" id="status-log">Connecting to open directory...</div>
</div>

<script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
    
    // Disable remote worker constraints to ensure smooth delivery within local runtime domains
    env.allowLocalModels = false;

    const BASE_API_URL = "https://de1.api.radio-browser.info/json/stations/search?limit=300&hidebroken=true&codec=mp3&order=clickcount";
    const POOL_SIZE = 8;
    
    let stations = [];
    let audioPool = [];
    
    let audioContext = null;
    let staticNode = null;
    let staticGain = null;
    let hpFilter = null;      
    let lpFilter = null;      
    let analyserNode = null; 
    let audioDataArray = null;
    
    // AI Pipeline Accumulators
    let recorderNode = null;
    let rawAudioAccumulator = [];
    let whisperTranscriber = null;
    let isAiDecoderActive = false;
    let isAiProcessingFrame = false;

    let isSweeping = false;
    let sweepTimeout = null;
    let activeAudio = null;
    let isChannelAudioVoicing = false;

    const startBtn = document.getElementById('start-btn');
    const decoderBtn = document.getElementById('decoder-btn');
    const langSelect = document.getElementById('lang-select');
    const sweepRateInput = document.getElementById('sweep-rate');
    const rateVal = document.getElementById('rate-val');
    const bassInput = document.getElementById('bass-cut');
    const bassVal = document.getElementById('bass-val');
    const trebleInput = document.getElementById('treble-cut');
    const trebleVal = document.getElementById('treble-val');
    const staticVolInput = document.getElementById('static-vol');
    const staticVal = document.getElementById('static-val');
    const stationNameDiv = document.getElementById('station-name');
    const stationInfoDiv = document.getElementById('station-info');
    const statusLog = document.getElementById('status-log');
    const terminalLog = document.getElementById('terminal-log');
    const interimTextLine = document.getElementById('interim-text-line');
    
    const canvas = document.getElementById('scope');
    const canvasCtx = canvas.getContext('2d');

    function resizeCanvas() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    sweepRateInput.addEventListener('input', () => rateVal.textContent = sweepRateInput.value);
    
    bassInput.addEventListener('input', () => {
        bassVal.textContent = bassInput.value;
        if (hpFilter) hpFilter.frequency.setValueAtTime(parseFloat(bassInput.value), audioContext.currentTime);
    });

    trebleInput.addEventListener('input', () => {
        trebleVal.textContent = (trebleInput.value / 1000).toFixed(1);
        if (lpFilter) lpFilter.frequency.setValueAtTime(parseFloat(trebleInput.value), audioContext.currentTime);
    });

    staticVolInput.addEventListener('input', () => {
        staticVal.textContent = staticVolInput.value;
        if (staticGain) staticGain.gain.setValueAtTime((staticVolInput.value / 100) * 0.15, audioContext.currentTime);
    });

    langSelect.addEventListener('change', async () => {
        statusLog.textContent = "Reloading station directory filters...";
        await fetchStations();
        if (isSweeping && audioPool.length > 0) {
            audioPool.forEach(audioObj => assignRandomStation(audioObj));
        }
    });

    // Initialize the AI Model Engine on App Initialization
    async function initAiModel() {
        try {
            logToTerminal("DOWNLOADING WHISPER MODEL (~75MB)... PLEASE WAIT.");
            whisperTranscriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny.en');
            logToTerminal("AI WAVEFORM NETWORK INITIALIZED AND READY.");
            decoderBtn.textContent = "ENABLE AI WAVEFORM DECODER";
            decoderBtn.disabled = false;
        } catch (error) {
            console.error(error);
            logToTerminal("AI ACCELERATION FAILED TO ALLOCATE. REFRESH PAGE.");
        }
    }

    function logToTerminal(text, isAiResult = false) {
        const newLine = document.createElement('div');
        newLine.className = isAiResult ? "terminal-line ai-log" : "terminal-line";
        newLine.textContent = text;
        terminalLog.insertBefore(newLine, interimTextLine.nextSibling);
    }

    function initAudioEngine() {
        if (audioContext) return;
        
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        hpFilter = audioContext.createBiquadFilter();
        hpFilter.type = "highpass";
        hpFilter.frequency.setValueAtTime(parseFloat(bassInput.value), audioContext.currentTime);

        lpFilter = audioContext.createBiquadFilter();
        lpFilter.type = "lowpass";
        lpFilter.frequency.setValueAtTime(parseFloat(trebleInput.value), audioContext.currentTime);

        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 256; 
        audioDataArray = new Uint8Array(analyserNode.frequencyBinCount);

        // Core DSP Interconnection Map
        hpFilter.connect(lpFilter);
        lpFilter.connect(analyserNode);
        analyserNode.connect(audioContext.destination);

        // Capture Node Setup: Extracts post-filter signal array frames for internal processing
        recorderNode = audioContext.createScriptProcessor(4096, 1, 1);
        lpFilter.connect(recorderNode);
        recorderNode.connect(audioContext.destination);

        recorderNode.onaudioprocess = (e) => {
            if (!isAiDecoderActive || !isSweeping) return;
            const inputData = e.inputBuffer.getChannelData(0);
            // Push active floating point blocks into the accumulation array
            rawAudioAccumulator.push(...inputData);

            // Once rolling window strikes a 3-second capture ceiling, compile array frames
            const sampleCeiling = audioContext.sampleRate * 3;
            if (rawAudioAccumulator.length >= sampleCeiling) {
                const chunkToProcess = new Float32Array(rawAudioAccumulator);
                rawAudioAccumulator = []; // Instantly flush array cache to minimize memory footprints
                processWaveformWithAi(chunkToProcess);
            }
        };

        // Synthesize Background Static Matrix
        const bufferSize = 2 * audioContext.sampleRate;
        const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            output[i] = Math.random() * 2 - 1;
        }

        staticNode = audioContext.createBufferSource();
        staticNode.buffer = noiseBuffer;
        staticNode.loop = true;

        staticGain = audioContext.createGain();
        staticGain.gain.setValueAtTime((staticVolInput.value / 100) * 0.15, audioContext.currentTime);

        staticNode.connect(staticGain);
        staticGain.connect(hpFilter); 
        staticNode.start();

        renderScopeLoop();
    }

    // Mathematical Waveform Downsampling function to scale system rates down to Whisper's 16kHz expectation
    function downsampleToWhisperRate(buffer, inputSampleRate) {
        const targetSampleRate = 16000;
        if (inputSampleRate === targetSampleRate) return buffer;
        
        const ratio = inputSampleRate / targetSampleRate;
        const newLength = Math.round(buffer.length / ratio);
        const result = new Float32Array(newLength);
        
        let offsetResult = 0;
        let offsetBuffer = 0;
        
        while (offsetResult < result.length) {
            let nextOffsetBuffer = Math.round((offsetResult + 1) * ratio);
            let accum = 0, count = 0;
            for (let i = offsetBuffer; i < nextOffsetBuffer && i < buffer.length; i++) {
                accum += buffer[i];
                count++;
            }
            result[offsetResult] = accum / count;
            offsetResult++;
            offsetBuffer = nextOffsetBuffer;
        }
        return result;
    }

    // Feed raw internal data buffer matrix into Whisper Pipeline
    async function processWaveformWithAi(rawFloatArray) {
        if (isAiProcessingFrame || !whisperTranscriber) return;
        isAiProcessingFrame = true;
        interimTextLine.textContent = "[AI CORE PARSING WAVEFORM EXCERPTS...]";

        try {
            // Downsample floating array vector sequence to 16000Hz
            const webAsmReadyBuffer = downsampleToWhisperRate(rawFloatArray, audioContext.sampleRate);

            // Compute direct prediction layers from the pure structural bits
            const response = await whisperTranscriber(webAsmReadyBuffer, {
                chunk_length_s: 30,
                stride_length_s: 5,
                return_timestamps: false
            });

            const parsedText = response.text.trim();
            if (parsedText.length > 0) {
                logToTerminal(`[AI DETECTED]: ${parsedText.toUpperCase()}`, true);
            }
        } catch (err) {
            console.error("Inference Processing Hiccup:", err);
        } finally {
            isAiProcessingFrame = false;
            interimTextLine.textContent = isAiDecoderActive ? "[AI WAVEFORM ANALYSIS ACTIVE]" : "";
        }
    }

    function renderScopeLoop() {
        requestAnimationFrame(renderScopeLoop);
        
        const width = canvas.width;
        const height = canvas.height;
        
        canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.25)';
        canvasCtx.fillRect(0, 0, width, height);

        if (analyserNode) {
            analyserNode.getByteTimeDomainData(audioDataArray);
        }

        canvasCtx.lineWidth = 2.5;
        canvasCtx.strokeStyle = '#00ff66';
        canvasCtx.beginPath();

        const bufferLength = audioDataArray ? audioDataArray.length : 128;
        const sliceWidth = width / (bufferLength - 1);
        let x = 0;

        for (let i = 0; i < bufferLength; i++) {
            let v = audioDataArray ? (audioDataArray[i] / 128.0) - 1.0 : 0.0;

            if (isSweeping && isChannelAudioVoicing) {
                let norm = i / (bufferLength - 1);
                let centerEnvelope = Math.sin(norm * Math.PI); 
                let organicWave = Math.sin(norm * 2.0 + Date.now() * 0.03) * 0.6;
                let microJitter = (Math.random() * 0.4 - 0.2);
                v += centerEnvelope * (organicWave + microJitter);
            }

            v = Math.max(-0.92, Math.min(0.92, v));
            let y = (height / 2) + (v * (height / 2));

            if (i === 0) canvasCtx.moveTo(x, y);
            else canvasCtx.lineTo(x, y);
            x += sliceWidth;
        }

        if (!isSweeping && (!audioContext || audioContext.state !== 'running')) {
            canvasCtx.moveTo(0, height / 2);
            canvasCtx.lineTo(width, height / 2);
        }
        canvasCtx.stroke();
    }

    async function fetchStations() {
        try {
            const chosenLang = langSelect.value;
            let finalUrl = BASE_API_URL;
            if (chosenLang !== "all") finalUrl += `&language=${chosenLang}`;

            const response = await fetch(finalUrl);
            let rawStations = await response.json();
            
            // Enforce explicit CORS compliance filters to guarantee unmuted internal data extraction
            let filteredCORS = rawStations.filter(s => s.has_cors === true || s.has_cors === 1 || s.has_cors === "1");
            if (filteredCORS.length > 10) {
                rawStations = filteredCORS;
            }

            const isHttpsMode = window.location.protocol === 'https:';
            if (isHttpsMode) {
                stations = rawStations.filter(s => (s.url_resolved || s.url).startsWith('https://'));
            } else {
                stations = rawStations;
            }
            statusLog.textContent = `Indexed ${stations.length} secure, cross-origin available stations.`;
            if (stations.length === 0) throw new Error("No channels found.");
        } catch (error) {
            console.error(error);
            statusLog.textContent = "Directory sync failure. Retrying...";
            setTimeout(fetchStations, 5000);
        }
    }

    function assignRandomStation(audioObj) {
        if (!stations.length) return;
        const randomTarget = stations[Math.floor(Math.random() * stations.length)];
        
        audioObj.element.src = randomTarget.url_resolved || randomTarget.url;
        audioObj.element.stationData = randomTarget;
        audioObj.element.volume = 0;
        
        audioObj.element.play().catch(() => {});
    }

    function buildAudioPool() {
        if (audioPool.length > 0) return;

        for (let i = 0; i < POOL_SIZE; i++) {
            const audioEl = new Audio();
            audioEl.preload = "auto";
            audioEl.crossOrigin = "anonymous"; 
            
            const sourceNode = audioContext.createMediaElementSource(audioEl);
            sourceNode.connect(hpFilter);

            const audioObj = {
                element: audioEl,
                sourceNode: sourceNode
            };

            audioEl.addEventListener('error', () => {
                if (isSweeping) assignRandomStation(audioObj);
            });

            assignRandomStation(audioObj);
            audioPool.push(audioObj);
        }
    }

    function executeSweep() {
        if (!isSweeping) return;

        if (activeAudio) {
            activeAudio.element.volume = 0;
            if (Math.random() < 0.50) {
                assignRandomStation(activeAudio);
            }
        }

        activeAudio = audioPool[Math.floor(Math.random() * audioPool.length)];

        if (activeAudio.element.readyState >= 2 && !activeAudio.element.error && !activeAudio.element.paused) {
            activeAudio.element.volume = 1.0; 
            isChannelAudioVoicing = true; 

            const cleanName = activeAudio.element.stationData.name.trim().toUpperCase().substring(0, 24);
            stationNameDiv.textContent = cleanName || "UNKNOWN SOURCE";
            stationInfoDiv.textContent = `CH: ${Math.floor(Math.random() * 800 + 100)} IP // LOC: ${activeAudio.element.stationData.countrycode || 'GLOBAL'}`;
        } else {
            isChannelAudioVoicing = false; 
            stationNameDiv.textContent = "--- DEAD AIR ---";
            stationInfoDiv.textContent = `TUNING RF INTERSTICES...`;
        }

        sweepTimeout = setTimeout(executeSweep, parseInt(sweepRateInput.value));
    }

    // Toggle AI Decoder Loop
    decoderBtn.addEventListener('click', () => {
        if (!whisperTranscriber) return;

        if (isAiDecoderActive) {
            isAiDecoderActive = false;
            decoderBtn.textContent = "ENABLE AI WAVEFORM DECODER";
            decoderBtn.classList.remove('active-decoding');
            interimTextLine.textContent = '';
            rawAudioAccumulator = [];
            logToTerminal("AI COGNITIVE TRANSLATION GRAPH DISENGAGED.");
        } else {
            isAiDecoderActive = true;
            decoderBtn.textContent = "DISENGAGE AI DECODER";
            decoderBtn.classList.add('active-decoding');
            interimTextLine.textContent = "[AI WAVEFORM ANALYSIS ACTIVE]";
            rawAudioAccumulator = [];
            logToTerminal("AI RUNTIME DETACHED FROM PHYSICAL AIR: INFERENCE NODE ONLINE.");
        }
    });

    startBtn.addEventListener('click', async () => {
        if (!audioContext) {
            initAudioEngine();
        }
        
        if (isSweeping) {
            isSweeping = false;
            isChannelAudioVoicing = false;
            clearTimeout(sweepTimeout);
            audioPool.forEach(a => a.element.volume = 0);
            if (activeAudio) activeAudio.element.volume = 0;
            
            if (audioContext && audioContext.state === 'running') {
                await audioContext.suspend();
            }
            
            startBtn.textContent = "START SWEEP";
            stationNameDiv.textContent = "SWEEP HALTED";
            stationInfoDiv.textContent = "SYSTEM STANDBY";
        } else {
            if (stations.length === 0) {
                statusLog.textContent = "Awaiting directory sync connection...";
                return;
            }
            if (audioContext && audioContext.state === 'suspended') {
                await audioContext.resume();
            }
            buildAudioPool();
            isSweeping = true;
            startBtn.textContent = "STOP SWEEP";
            executeSweep();
        }
    });

    // Run Fetch pipeline and call model download functions on script load
    fetchStations();
    initAiModel();
    renderScopeLoop();
</script>

</body>
</html>
