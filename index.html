<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barometric Pressure Tracker & Sonograph</title>
    <style>
        :root {
            --bg-color: #121214;
            --panel-color: #1a1a1e;
            --accent-color: #00d2ff;
            --alert-color: #ff3333;
            --text-color: #e0e0e6;
        }

        body {
            margin: 0;
            padding: 15px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 1.5rem;
            letter-spacing: 1px;
            color: #fff;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            background: #2a2a30;
            font-weight: bold;
        }

        .status-active { color: var(--accent-color); background: rgba(0, 210, 255, 0.1); }
        .status-alert { color: var(--alert-color); background: rgba(255, 51, 51, 0.1); animation: pulse 1s infinite alternate; }

        @keyframes pulse {
            from { opacity: 0.6; }
            to { opacity: 1; }
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        @media (max-width: 600px) {
            .dashboard { grid-template-columns: 1fr; }
        }

        .panel {
            background-color: var(--panel-color);
            border: 1px solid #2d2d34;
            border-radius: 8px;
            padding: 15px;
        }

        .readout {
            font-size: 2.8rem;
            font-weight: 700;
            font-family: monospace;
            text-align: center;
            margin: 20px 0;
            color: #fff;
        }

        .unit { font-size: 1.2rem; color: #888; font-weight: normal; }

        .controls label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .controls input {
            width: 100%;
            padding: 8px;
            background: #222226;
            border: 1px solid #3d3d45;
            border-radius: 4px;
            color: #fff;
            margin-top: 4px;
            box-sizing: border-box;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.95rem;
        }

        .btn-start { background-color: var(--accent-color); color: #000; }
        .btn-start:hover { background-color: #00bfe6; }
        .btn-stop { background-color: #3d3d45; color: #fff; }
        .btn-stop:hover { background-color: #4e4e58; }
        .btn-export { background-color: #4CAF50; color: #fff; grid-column: span 2; }

        canvas {
            width: 100%;
            height: 220px;
            background-color: #0a0a0c;
            border-radius: 8px;
            border: 1px solid #2d2d34;
            display: block;
            margin-bottom: 15px;
        }

        .log-panel {
            max-height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            background: #0a0a0c;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #2d2d34;
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #151518;
            display: flex;
            justify-content: space-between;
        }
        .log-entry.alert-row { color: var(--alert-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Barometric Real-Time Sonograph</h1>
        <div id="statusBadge" class="status-badge">System Ready</div>
    </header>

    <canvas id="sonographCanvas"></canvas>

    <div class="dashboard">
        <div class="panel">
            <h3>Atmospheric Pressure</h3>
            <div class="readout" id="pressureReadout">0.00 <span class="unit">hPa</span></div>
            <div style="text-align: center; color: #888; font-size: 0.85rem; font-family: monospace;" id="timeFeedback">
                No active session
            </div>
        </div>

        <div class="panel controls">
            <h3>Variance Settings</h3>
            <label>
                Tolerance Limit ($\Delta$ hPa):
                <input type="number" id="toleranceInput" value="0.15" step="0.01" min="0.01">
            </label>
            <label>
                Duration Window (Seconds):
                <input type="number" id="durationInput" value="5" step="1" min="1">
            </label>
            <div class="btn-group">
                <button class="btn-start" id="startBtn">Start Barometer</button>
                <button class="btn-stop" id="stopBtn" disabled>Stop</button>
                <button class="btn-export" id="exportBtn" disabled>Export CSV Log</button>
            </div>
        </div>
    </div>

    <div class="panel">
        <h3>System Activity Feed</h3>
        <div class="log-panel" id="logPanel">
            <div style="color: #666;">Logs will update dynamically with real timestamps upon initialization...</div>
        </div>
    </div>
</div>

<script>
    let sensor = null;
    let isMonitoring = false;
    let dataHistory = []; 
    let plotPoints = [];
    const maxPlotPoints = 300;
    let audioCtx = null;
    let alertActive = false;

    const canvas = document.getElementById('sonographCanvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const exportBtn = document.getElementById('exportBtn');
    const toleranceInput = document.getElementById('toleranceInput');
    const durationInput = document.getElementById('durationInput');
    const statusBadge = document.getElementById('statusBadge');
    const logPanel = document.getElementById('logPanel');

    function resizeCanvas() {
        canvas.width = canvas.clientWidth * window.devicePixelRatio;
        canvas.height = canvas.clientHeight * window.devicePixelRatio;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playAlertTone() {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(660, audioCtx.currentTime); 
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    }

    startBtn.addEventListener('click', async () => {
        initAudio();
        
        if (!('PressureSensor' in window)) {
            updateStatus("API Unsupported", "status-alert");
            alert("PressureSensor API is missing on this device/browser context. Check your HTTPS configuration or experimental flags.");
            return;
        }

        try {
            const permissionStatus = await navigator.permissions.query({ name: 'pressure' });
            if (permissionStatus.state === 'denied') {
                alert("Permission to access the barometric sensor was blocked.");
                return;
            }

            if (!sensor) {
                // Poll the barometer environment class at 10Hz
                sensor = new PressureSensor({ frequency: 10 }); 
                
                sensor.addEventListener('reading', () => {
                    handlePressureReading(sensor.pressure);
                });

                sensor.addEventListener('error', (event) => {
                    updateStatus(`Error: ${event.error.name}`, "status-alert");
                    stopMonitoring();
                });
            }

            sensor.start();
            isMonitoring = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            exportBtn.disabled = false;
            updateStatus("Monitoring Active", "status-active");
            logPanel.innerHTML = ""; 
            animatePlot();

        } catch (err) {
            updateStatus("Initialization Error", "status-alert");
        }
    });

    stopBtn.addEventListener('click', () => { stopMonitoring(); });

    function stopMonitoring() {
        if (sensor) sensor.stop();
        isMonitoring = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        updateStatus("Monitoring Stopped", "");
    }

    function updateStatus(text, className) {
        statusBadge.textContent = text;
        statusBadge.className = "status-badge " + className;
    }

    function handlePressureReading(pressureValue) {
        const now = Date.now();
        const timestampIso = new Date(now).toISOString();

        document.getElementById('pressureReadout').innerHTML = `${pressureValue.toFixed(2)} <span class="unit">hPa</span>`;
        document.getElementById('timeFeedback').textContent = `Last update: ${new Date(now).toLocaleTimeString()}`;

        const record = {
            epoch: now,
            isoString: timestampIso,
            pressure: pressureValue.toFixed(4),
            alertTriggered: false
        };

        dataHistory.push(record);
        plotPoints.push(pressureValue);
        if (plotPoints.length > maxPlotPoints) plotPoints.shift();

        evaluateAlertWindow(now, pressureValue, record);
    }

    function evaluateAlertWindow(currentTime, currentPres, currentRecord) {
        const durationSec = parseFloat(durationInput.value) || 5;
        const tolerance = parseFloat(toleranceInput.value) || 0.15;
        const windowThresholdMs = durationSec * 1000;

        let minVal = currentPres;
        let maxVal = currentPres;

        // Trace backward into frame log array
        for (let i = dataHistory.length - 1; i >= 0; i--) {
            if (currentTime - dataHistory[i].epoch > windowThresholdMs) break;
            
            const pVal = parseFloat(dataHistory[i].pressure);
            if (pVal < minVal) minVal = pVal;
            if (pVal > maxVal) maxVal = pVal;
        }

        const delta = maxVal - minVal;

        if (delta > tolerance) {
            currentRecord.alertTriggered = true;
            if (!alertActive) {
                alertActive = true;
                updateStatus("PRESSURE ANOMALY DETECTED", "status-alert");
                playAlertTone();
                appendLogEntry(`[SPIKE] Deviation: ${delta.toFixed(3)} hPa over ${durationSec}s`, true);
            }
        } else {
            if (alertActive) {
                alertActive = false;
                updateStatus("Monitoring Active", "status-active");
            }
        }
    }

    function appendLogEntry(message, isAlert = false) {
        const entry = document.createElement('div');
        entry.className = `log-entry ${isAlert ? 'alert-row' : ''}`;
        
        const timeSpan = document.createElement('span');
        timeSpan.textContent = new Date().toLocaleTimeString();
        
        const msgSpan = document.createElement('span');
        msgSpan.textContent = message;
        
        entry.appendChild(timeSpan);
        entry.appendChild(msgSpan);
        logPanel.insertBefore(entry, logPanel.firstChild);
    }

    function animatePlot() {
        if (!isMonitoring) return;

        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);

        ctx.strokeStyle = '#1c1c22';
        ctx.lineWidth = 1;
        for (let i = 0; i < h; i += h / 5) {
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(w, i);
            ctx.stroke();
        }

        if (plotPoints.length > 1) {
            ctx.beginPath();
            ctx.lineWidth = 3;
            
            const maxVal = Math.max(...plotPoints) + 0.05; 
            const minVal = Math.min(...plotPoints) - 0.05;
            const range = (maxVal - minVal) || 1;

            ctx.strokeStyle = alertActive ? '#ff3333' : '#00d2ff';

            for (let i = 0; i < plotPoints.length; i++) {
                const xPos = (i / (maxPlotPoints - 1)) * w;
                const yPos = h - ((plotPoints[i] - minVal) / range) * h; 

                if (i === 0) ctx.moveTo(xPos, yPos);
                else ctx.lineTo(xPos, yPos);
            }
            ctx.stroke();

            ctx.lineTo(w * (plotPoints.length - 1) / (maxPlotPoints - 1), h);
            ctx.lineTo(0, h);
            ctx.fillStyle = alertActive ? 'rgba(255, 51, 51, 0.04)' : 'rgba(0, 210, 255, 0.04)';
            ctx.fill();
        }

        requestAnimationFrame(animatePlot);
    }

    exportBtn.addEventListener('click', () => {
        if (dataHistory.length === 0) return;

        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += "Timestamp (ISO),Epoch (ms),Atmospheric Pressure (hPa),Threshold Breach\n";

        dataHistory.forEach(r => {
            csvContent += `${r.isoString},${r.epoch},${r.pressure},${r.alertTriggered}\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `baro_data_${Date.now()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });
</script>

</body>
</html>
